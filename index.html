<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faherty NSO Assortment Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useCallback, useRef, Fragment } = React;

    // ============================================
    // MULTI-SELECT FILTER COMPONENT
    // ============================================

    const MultiSelectFilter = ({ options, selected, onChange, placeholder }) => {
      const [open, setOpen] = useState(false);
      const [search, setSearch] = useState('');
      const ref = useRef(null);

      // Close dropdown when clicking outside
      React.useEffect(() => {
        const handleClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', handleClick);
        return () => document.removeEventListener('mousedown', handleClick);
      }, []);

      const filtered = options.filter(o => !search || String(o).toLowerCase().includes(search.toLowerCase()));
      const selectedSet = new Set(selected || []);
      const hasSelection = selectedSet.size > 0;

      const toggle = (val) => {
        const next = new Set(selectedSet);
        if (next.has(val)) next.delete(val); else next.add(val);
        onChange(Array.from(next));
      };

      const selectAll = () => onChange(filtered.map(String));
      const clearAll = () => onChange([]);

      return (
        <div ref={ref} className="relative" style={{minWidth: '60px'}}>
          <button
            onClick={() => setOpen(!open)}
            className={`w-full px-1 py-0.5 border rounded text-xs text-left truncate ${hasSelection ? 'border-blue-400 bg-blue-50 text-blue-700 font-semibold' : 'border-gray-200 bg-white text-gray-500'}`}
            title={hasSelection ? selected.join(', ') : 'All'}
          >
            {hasSelection ? (selected.length === 1 ? selected[0] : selected.length + ' selected') : 'All'}
          </button>
          {open && (
            <div className="absolute z-50 mt-1 bg-white border border-gray-300 rounded-lg shadow-lg" style={{minWidth: '180px', maxHeight: '280px'}}>
              <div className="p-1.5 border-b border-gray-200">
                <input
                  type="text"
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder={'Search...'}
                  className="w-full px-2 py-1 border border-gray-200 rounded text-xs"
                  autoFocus
                />
              </div>
              <div className="px-1.5 py-1 border-b border-gray-100 flex gap-1">
                <button onClick={selectAll} className="text-xs text-blue-600 hover:underline">All</button>
                <span className="text-gray-300">|</span>
                <button onClick={clearAll} className="text-xs text-red-500 hover:underline">Clear</button>
              </div>
              <div className="overflow-y-auto" style={{maxHeight: '200px'}}>
                {filtered.length === 0 ? (
                  <div className="px-2 py-2 text-xs text-gray-400">No matches</div>
                ) : filtered.map(opt => (
                  <label key={opt} className="flex items-center px-2 py-1 hover:bg-gray-50 cursor-pointer">
                    <input type="checkbox" checked={selectedSet.has(opt)} onChange={() => toggle(opt)} className="w-3 h-3 mr-2" />
                    <span className="text-xs truncate">{opt}</span>
                  </label>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    // ============================================
    // UTILITY FUNCTIONS
    // ============================================

    // Format a value as a rounded whole number with commas
    // Handles: numbers (8500.75), currency strings ("$2,500,000.50"), percentages ("45.2%"), or plain strings
    const fmtNum = (val) => {
      if (val === undefined || val === null || val === '') return '';
      const str = String(val).trim();
      // Strip $, commas, spaces for parsing
      const cleaned = str.replace(/[$,\s]/g, '');
      // Check if it's a percentage — leave as-is but round
      if (str.includes('%')) {
        const num = parseFloat(cleaned);
        if (!isNaN(num)) return Math.round(num) + '%';
        return str;
      }
      const num = parseFloat(cleaned);
      if (isNaN(num)) return str;
      // Round and add commas
      return Math.round(num).toLocaleString('en-US');
    };

    const parseProForma = (fileData) => {
      try {
        const workbook = XLSX.read(fileData, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        const result = {
          newStoreName: '',
          newStoreOpenDate: '',
          newStoreRegion: '',
          newStoreArea: '',
          newStoreVibe: '',
          newStoreGrossSqft: '',
          newStoreSellingSquareFeet: '',
          newStoreRent: '',
          newStoreNetSales: '',
          newStoreGM: '',
          newStoreEBITDA: '',
          newStoreTraffic: '',
          newStoreCVR: '',
          newStoreAOV: '',
          newStoreSalesPerSqft: '',
          newStorePayback: '',
          compStoreName: '',
          compStoreOpenDate: '',
          compStoreRegion: '',
          compStoreArea: '',
          compStoreGrossSqft: '',
          compStoreSellingSquareFeet: '',
          compStoreRent: '',
          compStoreNetSales: '',
          compStoreGM: '',
          compStoreEBITDA: '',
          compStoreTraffic: '',
          compStoreCVR: '',
          compStoreAOV: '',
          compStoreSalesPerSqft: '',
          compStorePayback: '',
          compStoreAnalysis: [],
          divMix: {},
        };

        // The Pro Forma has a side-by-side layout:
        // LEFT side = Comp Store data, RIGHT side = New Store data
        // Labels repeat in each half, with empty cells as spacing.
        // Example row: [empty, empty, "Open Date", empty, "9/15/21", empty, "Open Date", "5/2/26"]
        // We need to find the label and grab the next NON-EMPTY value after it.
        // For new store data, we look for the SECOND occurrence of the label (right half).
        // For comp data, we use the FIRST occurrence.

        const findNextNonEmpty = (row, startIdx) => {
          for (let k = startIdx; k < row.length; k++) {
            if (row[k] !== undefined && row[k] !== null && String(row[k]).trim() !== '') {
              return row[k];
            }
          }
          return '';
        };

        // Find the comparison section — the row where "Comp Store" and "New Store" appear together
        let compSectionStart = 0;
        for (let i = 0; i < Math.min(20, jsonData.length); i++) {
          const row = jsonData[i];
          if (!Array.isArray(row)) continue;
          const rowStr = row.map(c => String(c || '').toLowerCase()).join('|');
          if (rowStr.includes('comp store') && rowStr.includes('new store')) {
            compSectionStart = i;
            break;
          }
        }

        // Search within the comparison section (skips summary rows at top).
        // side='comp' → first occurrence in a row (left side, value typically in col 4)
        // side='new' → second occurrence in a row (right side, value typically in col 7)
        const findValue = (label, side = 'comp') => {
          const lbl = label.toLowerCase();
          for (let i = compSectionStart; i < jsonData.length; i++) {
            const row = jsonData[i];
            if (!Array.isArray(row)) continue;
            const positions = [];
            for (let j = 0; j < row.length; j++) {
              if (row[j] && String(row[j]).toLowerCase().includes(lbl)) {
                positions.push(j);
              }
            }
            if (positions.length === 0) continue;
            if (side === 'comp') {
              return findNextNonEmpty(row, positions[0] + 1);
            } else {
              const pos = positions.length >= 2 ? positions[1] : positions[0];
              return findNextNonEmpty(row, pos + 1);
            }
          }
          return '';
        };

        // Find new store name — looks for pattern like "The Gardens (Palm Beach Gardens,FL)"
        const findNewStoreName = () => {
          for (let i = 0; i < Math.min(30, jsonData.length); i++) {
            const row = jsonData[i];
            if (!Array.isArray(row)) continue;
            for (let j = 0; j < row.length; j++) {
              const cell = row[j];
              if (cell && String(cell).includes('(') && String(cell).includes(',') && String(cell).includes(')')) {
                return String(cell);
              }
            }
          }
          return '';
        };

        // Find comp store name — it's in the row right after "Comp Store" label, same column area
        const findCompName = () => {
          for (let i = 0; i < Math.min(30, jsonData.length); i++) {
            const row = jsonData[i];
            if (!Array.isArray(row)) continue;
            for (let j = 0; j < row.length; j++) {
              if (row[j] && String(row[j]).toLowerCase() === 'comp store') {
                // The comp store NAME is in the next row, same column position area
                // OR it could be the next non-empty cell to the right
                // Check if next cell has the name
                const nextVal = findNextNonEmpty(row, j + 1);
                if (nextVal && !String(nextVal).toLowerCase().includes('new store') && !String(nextVal).toLowerCase().includes('net sales')) {
                  return nextVal;
                }
                // Otherwise check the row below in the same column area
                if (i + 1 < jsonData.length) {
                  const nextRow = jsonData[i + 1];
                  if (Array.isArray(nextRow)) {
                    const val = findNextNonEmpty(nextRow, j);
                    if (val) return val;
                  }
                }
              }
            }
          }
          // Fallback: look for the "Comp Store" header row where name is directly below
          return findValue('comp store', 1);
        };

        result.newStoreName = findNewStoreName();
        result.compStoreName = findCompName();

        // Helper to convert Excel date serial numbers or date strings to YYYY-MM-DD
        const toDateStr = (val) => {
          if (!val) return '';
          // If it's a number (Excel serial date), convert it
          if (typeof val === 'number') {
            const excelEpoch = new Date(1899, 11, 30);
            const date = new Date(excelEpoch.getTime() + val * 86400000);
            return date.toISOString().split('T')[0];
          }
          // If it's already a string like "9/15/21" or "5/2/26", parse it
          const str = String(val).trim();
          const parts = str.split('/');
          if (parts.length === 3) {
            let [m, d, y] = parts.map(Number);
            if (y < 100) y += y < 50 ? 2000 : 1900;
            return y + '-' + String(m).padStart(2, '0') + '-' + String(d).padStart(2, '0');
          }
          return str;
        };

        // Helper to convert to display format MM/DD/YYYY
        const toDisplayDate = (val) => {
          if (!val) return '';
          if (typeof val === 'number') {
            const excelEpoch = new Date(1899, 11, 30);
            const date = new Date(excelEpoch.getTime() + val * 86400000);
            return (date.getMonth() + 1) + '/' + date.getDate() + '/' + date.getFullYear();
          }
          const str = String(val).trim();
          const parts = str.split('/');
          if (parts.length === 3) {
            let [m, d, y] = parts.map(Number);
            if (y < 100) y += y < 50 ? 2000 : 1900;
            return m + '/' + d + '/' + y;
          }
          // Try YYYY-MM-DD format
          const isoParts = str.split('-');
          if (isoParts.length === 3 && isoParts[0].length === 4) {
            return parseInt(isoParts[1]) + '/' + parseInt(isoParts[2]) + '/' + isoParts[0];
          }
          return str;
        };

        // Comp = left side of comparison, New = right side
        result.compStoreOpenDate = toDisplayDate(findValue('Open Date', 'comp'));
        result.newStoreOpenDate = toDateStr(findValue('Open Date', 'new'));
        result.compStoreRegion = findValue('Region', 'comp');
        result.newStoreRegion = findValue('Region', 'new');
        result.compStoreArea = findValue('Type', 'comp');
        result.newStoreArea = findValue('Type', 'new');
        result.compStoreGrossSqft = findValue('Gross Sq. Ft.', 'comp');
        result.newStoreGrossSqft = findValue('Gross Sq. Ft.', 'new');
        result.compStoreSellingSquareFeet = findValue('Selling Sq. Ft.', 'comp');
        result.newStoreSellingSquareFeet = findValue('Selling Sq. Ft.', 'new');
        result.compStoreRent = findValue('Avg. Annual Rent', 'comp');
        result.newStoreRent = findValue('Avg. Annual Rent', 'new');
        result.compStoreNetSales = findValue('Net Sales', 'comp');
        result.newStoreNetSales = findValue('Net Sales', 'new');
        result.compStoreGM = findValue('Gross Margin', 'comp');
        result.newStoreGM = findValue('Gross Margin', 'new');
        result.compStoreEBITDA = findValue('Adj. EBITDA', 'comp');
        result.newStoreEBITDA = findValue('Adj. EBITDA', 'new');
        result.compStoreTraffic = findValue('Traffic', 'comp');
        result.newStoreTraffic = findValue('Traffic', 'new');
        result.compStoreCVR = findValue('CVR', 'comp');
        result.newStoreCVR = findValue('CVR', 'new');
        result.compStoreAOV = findValue('Net AOV', 'comp');
        result.newStoreAOV = findValue('Net AOV', 'new');
        result.compStoreSalesPerSqft = findValue('Sales per Selling', 'comp');
        result.newStoreSalesPerSqft = findValue('Sales per Selling', 'new');
        result.compStorePayback = findValue('Payback Period', 'comp');
        result.newStorePayback = findValue('Payback Period', 'new');

        // Find the Comp Store Analysis section
        // In the Pro Forma, the analysis table has a "Comp Store Analysis" label,
        // then a header row with column names, then data rows.
        // The table is indented (data starts around column 2).
        let compAnalysisStartRow = -1;
        for (let i = 0; i < jsonData.length; i++) {
          const row = jsonData[i];
          if (!Array.isArray(row)) continue;
          for (let j = 0; j < row.length; j++) {
            if (row[j] && String(row[j]).toLowerCase().includes('comp store analysis')) {
              compAnalysisStartRow = i;
              break;
            }
          }
          if (compAnalysisStartRow >= 0) break;
        }

        if (compAnalysisStartRow >= 0) {
          // Find the header row (contains "Comp Store" and "Open" and "Region")
          let headerRow = -1;
          let dataCol = 2; // data typically starts at column 2 due to indentation
          for (let i = compAnalysisStartRow; i < Math.min(compAnalysisStartRow + 10, jsonData.length); i++) {
            const row = jsonData[i];
            if (!Array.isArray(row)) continue;
            const rowStr = row.join(' ').toLowerCase();
            if (rowStr.includes('comp store') && rowStr.includes('open') && (rowStr.includes('region') || rowStr.includes('date'))) {
              headerRow = i;
              // Find which column has "Comp Store"
              for (let j = 0; j < row.length; j++) {
                if (row[j] && String(row[j]).toLowerCase().includes('comp store')) {
                  dataCol = j;
                  break;
                }
              }
              break;
            }
          }

          if (headerRow >= 0) {
            // Parse data rows starting after the header
            for (let i = headerRow + 1; i < jsonData.length; i++) {
              const row = jsonData[i];
              if (!Array.isArray(row)) break;
              const storeName = row[dataCol];
              if (!storeName || String(storeName).trim() === '') {
                // Check if it's the "Comp Group Median" row
                const nextVal = findNextNonEmpty(row, dataCol);
                if (nextVal && String(nextVal).toLowerCase().includes('median')) {
                  continue;
                }
                break;
              }
              const d = dataCol; // shorthand
              result.compStoreAnalysis.push({
                compStore: row[d] || '',
                openDate: row[d+1] || '',
                region: row[d+2] || '',
                type: row[d+3] || '',
                grossSqft: row[d+4] || '',
                sellingSqft: row[d+5] || '',
                grossCapex: row[d+6] || '',
                ta: row[d+7] || '',
                netCapex: row[d+8] || '',
                netPerGrossSqft: row[d+9] || '',
                paybackMonths: row[d+10] || '',
                traffic: row[d+11] || '',
                cvr: row[d+12] || '',
                aov: row[d+13] || '',
                netSales: row[d+14] || '',
                gmPercent: row[d+15] || '',
                compPercNS: row[d+16] || '',
                rentPercNS: row[d+17] || '',
                adjEBITDA: row[d+18] || '',
                ebitdaPercent: row[d+19] || '',
              });
            }
          }
        }

        return result;
      } catch (error) {
        console.error('Error parsing Pro Forma:', error);
        return {
          newStoreName: '',
          newStoreOpenDate: '',
          newStoreRegion: '',
          newStoreArea: '',
          newStoreVibe: '',
          newStoreGrossSqft: '',
          newStoreSellingSquareFeet: '',
          newStoreRent: '',
          newStoreNetSales: '',
          newStoreGM: '',
          newStoreEBITDA: '',
          newStoreTraffic: '',
          newStoreCVR: '',
          newStoreAOV: '',
          newStoreSalesPerSqft: '',
          newStorePayback: '',
          compStoreName: '',
          compStoreOpenDate: '',
          compStoreRegion: '',
          compStoreArea: '',
          compStoreGrossSqft: '',
          compStoreSellingSquareFeet: '',
          compStoreRent: '',
          compStoreNetSales: '',
          compStoreGM: '',
          compStoreEBITDA: '',
          compStoreTraffic: '',
          compStoreCVR: '',
          compStoreAOV: '',
          compStoreSalesPerSqft: '',
          compStorePayback: '',
          compStoreAnalysis: [],
          divMix: {},
        };
      }
    };

    const parseStoreTieringTool = (fileData) => {
      try {
        const workbook = XLSX.read(fileData, { type: 'array' });
        const result = {
          allStores: [],
          mensData: [],
          womensData: [],
          nonApparel: [],
          kidsData: [],
          storeGroups: [],
          storeMatrix: {},
          totalRollup: [],
        };

        // Parse Attributes Upload
        if (workbook.SheetNames.includes('Attributes Upload')) {
          const sheet = workbook.Sheets['Attributes Upload'];
          const data = XLSX.utils.sheet_to_json(sheet);
          const uniqueStores = new Set();
          data.forEach(row => {
            if (row['Location Name']) {
              uniqueStores.add(row['Location Name']);
            }
          });
          result.allStores = Array.from(uniqueStores);
        }

        // Parse division sheets — these have a complex layout:
        // Rows 1-10ish: title, index weights, tier thresholds, chain averages
        // Then a header row with: Store | Region | Area | Vibe | Comp Type | Sim Store | SqFt | Net Sales TY | ... | Proposed Tier | Override Tier | ...
        // Then data rows with actual store tiering data.
        // We need to find the header row first, then parse data below it.
        const divisionMap = {
          'Mens': 'mensData',
          'Womens': 'womensData',
          'Non Apparel': 'nonApparel',
          'Kids': 'kidsData',
        };

        Object.entries(divisionMap).forEach(([sheetName, resultKey]) => {
          if (workbook.SheetNames.includes(sheetName)) {
            const sheet = workbook.Sheets[sheetName];
            const rawData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            // Find the header row — it contains "Store" and "Region" and "Proposed Tier"
            let headerRowIdx = -1;
            for (let i = 0; i < Math.min(20, rawData.length); i++) {
              const row = rawData[i];
              if (!Array.isArray(row)) continue;
              const rowStr = row.map(c => String(c || '').toLowerCase()).join('|');
              if (rowStr.includes('store') && rowStr.includes('region') && (rowStr.includes('proposed tier') || rowStr.includes('composite'))) {
                headerRowIdx = i;
                break;
              }
            }

            if (headerRowIdx >= 0) {
              const headers = rawData[headerRowIdx].map(h => String(h || '').trim());
              const parsed = [];
              for (let i = headerRowIdx + 1; i < rawData.length; i++) {
                const row = rawData[i];
                if (!Array.isArray(row) || !row[0] || String(row[0]).trim() === '') continue;
                // Skip summary rows like "Comp Group Median"
                if (String(row[0]).toLowerCase().includes('median') || String(row[0]).toLowerCase().includes('total')) continue;
                const obj = {};
                headers.forEach((h, j) => {
                  if (h) obj[h] = row[j] !== undefined ? row[j] : '';
                });
                parsed.push(obj);
              }
              result[resultKey] = parsed;
            }
          }
        });

        // Parse Store Matrix — try multiple possible sheet names
        const matrixSheetNames = ['Store Matrix', 'StoreMatrix', 'Store_Matrix', 'Matrix', 'Store Groups', 'StoreGroups'];
        let matrixSheetName = null;
        for (const name of matrixSheetNames) {
          if (workbook.SheetNames.includes(name)) {
            matrixSheetName = name;
            break;
          }
        }
        // Also check for any sheet name containing "matrix" (case-insensitive)
        if (!matrixSheetName) {
          matrixSheetName = workbook.SheetNames.find(s => s.toLowerCase().includes('matrix'));
        }

        if (matrixSheetName) {
          const sheet = workbook.Sheets[matrixSheetName];
          const rawData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
          if (rawData.length > 0) {
            // Find the header row — it should have a store name column and group name columns
            // The first column with store names, remaining columns are group names with X marks
            let headerRowIdx = 0;
            let storeColIdx = 0;

            // Scan first few rows to find the one that looks like a header (has multiple text values)
            for (let i = 0; i < Math.min(5, rawData.length); i++) {
              const row = rawData[i];
              if (!Array.isArray(row)) continue;
              const nonEmptyCells = row.filter(c => c !== undefined && c !== null && String(c).trim() !== '');
              if (nonEmptyCells.length >= 3) {
                headerRowIdx = i;
                // Find which column has the first header text (store column)
                for (let j = 0; j < row.length; j++) {
                  if (row[j] !== undefined && row[j] !== null && String(row[j]).trim() !== '') {
                    storeColIdx = j;
                    break;
                  }
                }
                break;
              }
            }

            const headers = rawData[headerRowIdx];
            // Group names are all columns after the store name column
            const groupNames = [];
            for (let j = storeColIdx + 1; j < headers.length; j++) {
              if (headers[j] && String(headers[j]).trim() !== '') {
                groupNames.push(String(headers[j]).trim());
              }
            }
            result.storeGroups = groupNames;

            // Parse each store row
            for (let i = headerRowIdx + 1; i < rawData.length; i++) {
              const row = rawData[i];
              if (!Array.isArray(row)) continue;
              const storeName = row[storeColIdx];
              if (!storeName || String(storeName).trim() === '') continue;
              const storeKey = String(storeName).trim();
              const groups = [];
              for (let j = storeColIdx + 1; j < row.length; j++) {
                const cell = row[j];
                const groupIdx = j - (storeColIdx + 1);
                if (cell && String(cell).toUpperCase().trim() === 'X' && groupIdx < groupNames.length) {
                  groups.push(groupNames[groupIdx]);
                }
              }
              result.storeMatrix[storeKey] = groups;
            }
          }
        }

        // Parse Total Rollup
        if (workbook.SheetNames.includes('Total Rollup')) {
          const sheet = workbook.Sheets['Total Rollup'];
          const data = XLSX.utils.sheet_to_json(sheet);
          result.totalRollup = data;
        }

        return result;
      } catch (error) {
        console.error('Error parsing Store Tiering Tool:', error);
        return {
          allStores: [],
          mensData: [],
          womensData: [],
          nonApparel: [],
          kidsData: [],
          storeGroups: [],
          storeMatrix: {},
          totalRollup: [],
        };
      }
    };

    const parsePST = (fileData) => {
      try {
        const workbook = XLSX.read(fileData, { type: 'array' });
        // Try "PST" sheet first, fallback to first sheet
        const sheetName = workbook.SheetNames.includes('PST') ? 'PST' : workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const rawData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        // Find the actual header row — look for "Year" and "SKU" and "Department"
        let headerIdx = 3; // default to row 4 (0-indexed 3)
        for (let i = 0; i < Math.min(10, rawData.length); i++) {
          const row = rawData[i];
          if (!Array.isArray(row)) continue;
          const rowStr = row.map(c => String(c || '').toLowerCase()).join('|');
          if (rowStr.includes('year') && rowStr.includes('sku') && rowStr.includes('department')) {
            headerIdx = i;
            break;
          }
        }

        // Map header names to column indices
        const headers = rawData[headerIdx] || [];
        const colMap = {};
        headers.forEach((h, idx) => {
          if (h) colMap[String(h).trim()] = idx;
        });

        // Helper to get column index by partial name match
        const getCol = (partialName) => {
          const lower = partialName.toLowerCase();
          const key = Object.keys(colMap).find(k => k.toLowerCase().includes(lower));
          return key ? colMap[key] : -1;
        };

        const cYear = getCol('Year');
        const cSeason = getCol('Season Code');
        const cDept = getCol('Department');
        const cSKU = getCol('SKU');
        const cCat = getCol('Category');
        const cSubcat = getCol('Subcategory');
        const cStyle = getCol('Style') >= 0 ? getCol('Style') : -1;
        // "Style" might match "Style Description" too, so be more specific
        const cStyleIdx = Object.keys(colMap).findIndex(k => k === 'Style');
        const cStyleDescIdx = Object.keys(colMap).findIndex(k => k === 'Style Description');
        const cStyleCol = cStyleIdx >= 0 ? colMap['Style'] : getCol('Style');
        const cStyleDesc = colMap['Style Description'] !== undefined ? colMap['Style Description'] : getCol('Style Desc');
        const cColorCode = getCol('Color Code');
        const cColorDesc = getCol('Color Description');
        const cCommit = getCol('Commit Coding');
        const cRollRetail = colMap['Roll Out Code - Retail'] !== undefined ? colMap['Roll Out Code - Retail'] : getCol('Roll Out Code');
        const cRollOnline = colMap['Roll Out Code - Online'] !== undefined ? colMap['Roll Out Code - Online'] : -1;
        const cDelivery = getCol('Delivery Month');
        const cLifeCycle = getCol('Seasonal Life Cycle');
        const cStoreTier = getCol('Store Tier');
        const cStoreCount = getCol('Store Count');
        const cAIR = getCol('AIR');
        const cAUC = getCol('AUC');
        const cSizeScale = getCol('Size Scale');
        const cMSRP = colMap['MSRP'] !== undefined ? colMap['MSRP'] : -1;
        const cMDExitWeek = colMap['Final MD Exit Week'] !== undefined ? colMap['Final MD Exit Week'] : getCol('MD Exit Week');

        const pstData = [];
        for (let i = headerIdx + 1; i < rawData.length; i++) {
          const row = rawData[i];
          if (!Array.isArray(row)) continue;
          // Skip rows without a SKU or Department
          const sku = cSKU >= 0 ? row[cSKU] : '';
          const dept = cDept >= 0 ? row[cDept] : '';
          if (!sku && !dept) continue;

          pstData.push({
            year: cYear >= 0 ? (row[cYear] || '') : '',
            seasonCode: cSeason >= 0 ? (row[cSeason] || '') : '',
            department: dept || '',
            sku: sku || '',
            category: cCat >= 0 ? (row[cCat] || '') : '',
            subcategory: cSubcat >= 0 ? (row[cSubcat] || '') : '',
            style: cStyleCol >= 0 ? (row[cStyleCol] || '') : '',
            styleDescription: cStyleDesc >= 0 ? (row[cStyleDesc] || '') : '',
            colorCode: cColorCode >= 0 ? (row[cColorCode] || '') : '',
            colorDescription: cColorDesc >= 0 ? (row[cColorDesc] || '') : '',
            commitCoding: cCommit >= 0 ? (row[cCommit] || '') : '',
            rollOutCodeRetail: cRollRetail >= 0 ? (row[cRollRetail] || '') : '',
            rollOutCodeOnline: cRollOnline >= 0 ? (row[cRollOnline] || '') : '',
            deliveryMonth: cDelivery >= 0 ? (row[cDelivery] || '') : '',
            seasonalLifeCycle: cLifeCycle >= 0 ? (row[cLifeCycle] || '') : '',
            storeTier: cStoreTier >= 0 ? (row[cStoreTier] || '') : '',
            storeCount: cStoreCount >= 0 ? (row[cStoreCount] || '') : '',
            air: cAIR >= 0 ? (row[cAIR] || '') : '',
            auc: cAUC >= 0 ? (row[cAUC] || '') : '',
            sizeScale: cSizeScale >= 0 ? (row[cSizeScale] || '') : '',
            msrp: cMSRP >= 0 ? (row[cMSRP] || '') : '',
            mdExitWeek: cMDExitWeek >= 0 ? (row[cMDExitWeek] || '') : '',
          });
        }

        return pstData;
      } catch (error) {
        console.error('Error parsing PST:', error);
        return [];
      }
    };

    // ============================================
    // STEP 1: STORE SETUP & FINANCIAL TOPLINE
    // ============================================

    const Step1 = ({ onNext, onDataChange, data }) => {

                        </div>

                        <div>

                          <input type="text" value={fmtNum(data.proFormaData.compStoreNetSales)} onChange={(e) => handleFieldChange('compStoreNetSales', e.target.value)} className="w-full px-2 py-1.5 border border-gray-300 rounded text-xs" />

                          <div className="w-full px-2 py-1.5 border border-gray-200 rounded text-xs bg-gray-50 text-gray-700 font-semibold">
                            {(() => {

                        <input type="text" value={comp.vibe || ''} onChange={(e) => handleCompAnalysisChange(idx, 'vibe', e.target.value)} className="w-full px-2 py-1.5 border border-gray-300 rounded text-xs" placeholder="e.g. Beach, Mountain" />

                      <div className="grid grid-cols-2 gap-2">

                          <label className="block text-xs font-semibold text-gray-600">Gross Sq. Ft.</label>

            </div>

            {data.simStore && (

                      {(data.proFormaData.compStoreAnalysis || []).map((comp, idx) => {

                          </td>
                          {/* Primary Comp Store */}
                          {compName && (
                            <td className="px-3 py-1.5 bg-green-50">
                              <input
                                type="text"
                                value={(divMix[compName] || {})[div.key] || ''}
                                onChange={(e) => {
                                  const updated = { ...divMix, [compName]: { ...(divMix[compName] || {}), [div.key]: e.target.value } };
                                  onDataChange({ ...data, proFormaData: { ...data.proFormaData, divMix: updated } });
                                }}
                                className="w-full px-2 py-1 border border-gray-300 rounded text-xs text-center"
                                placeholder="%"
                              />
                            </td>
                          )}
                          {/* Additional Comp Stores */}
                          {additionalStores.map((storeName, idx) => (
                            <td key={idx} className="px-3 py-1.5">
                              <input
                                type="text"
                                value={(divMix[storeName] || {})[div.key] || ''}
                                onChange={(e) => {
                                  const updated = { ...divMix, [storeName]: { ...(divMix[storeName] || {}), [div.key]: e.target.value } };
                                  onDataChange({ ...data, proFormaData: { ...data.proFormaData, divMix: updated } });
                                }}
                                className="w-full px-2 py-1 border border-gray-300 rounded text-xs text-center"
                                placeholder="%"
                              />
                            </td>
                          ))}
                        </tr>
                      );
                    })}
                    {/* Total Row */}
                    {(() => {
                      const divMix = data.proFormaData.divMix || {};
                      const compName = String(data.proFormaData.compStoreName || '').trim();
                      const additionalStores = (data.proFormaData.compStoreAnalysis || [])
                        .map(c => String(c.compStore || '').trim())
                        .filter(n => n && n !== compName);
                      const sumPct = (storeKey) => {
                        const mix = divMix[storeKey] || {};
                        return ['mens','womens','nonApparel','kids']
                          .map(k => parseFloat(String(mix[k] || '0').replace(/[%]/g, '')) || 0)
                          .reduce((s, v) => s + v, 0);
                      };
                      const newTotal = sumPct('__new__');
                      const compTotal = compName ? sumPct(compName) : null;
                      return (
                        <tr className="bg-gray-800 text-white font-bold border-t-2 border-gray-600">
                          <td className="px-4 py-2">TOTAL</td>
                          <td className={`px-4 py-2 text-center ${newTotal !== 100 && newTotal > 0 ? 'text-yellow-300' : ''}`}>{newTotal > 0 ? newTotal + '%' : '—'}</td>
                          {compName && <td className={`px-4 py-2 text-center ${compTotal !== 100 && compTotal > 0 ? 'text-yellow-300' : ''}`}>{compTotal > 0 ? compTotal + '%' : '—'}</td>}
                          {additionalStores.map((storeName, idx) => {
                            const t = sumPct(storeName);
                            return <td key={idx} className={`px-4 py-2 text-center ${t !== 100 && t > 0 ? 'text-yellow-300' : ''}`}>{t > 0 ? t + '%' : '—'}</td>;
                          })}
                        </tr>
                      );
                    })()}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <div className="flex justify-between pt-8 border-t border-gray-200">
            <button disabled className="px-6 py-2 bg-gray-300 text-gray-600 rounded-md font-semibold cursor-not-allowed">
              Previous
            </button>
            <button
              onClick={() => onNext(2)}
              className="px-6 py-2 bg-blue-600 text-white rounded-md font-semibold hover:bg-blue-700"
            >
              Next: Store Tiering
            </button>
          </div>
        </div>
      );
    };

    // ============================================
    // STEP 2: STORE TIERING & GROUPS
    // ============================================

    const Step2 = ({ onNext, onPrev, onDataChange, data }) => {
      const fileInputRef = useRef(null);

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = parseStoreTieringTool(new Uint8Array(event.target.result));

            // Auto-populate selectedGroups from Store Matrix
            // Priority: New Store first → if not found, fall back to Sim Store
            let autoGroups = [];
            const simStoreName = (data.simStore || '').trim();
            const newStoreName = (data.proFormaData.newStoreName || '').trim();

            const matrixKeys = Object.keys(parsed.storeMatrix);
            const findStore = (name) => {
              if (!name) return null;
              const lower = name.toLowerCase();
              return matrixKeys.find(k =>
                k.toLowerCase() === lower ||
                lower.includes(k.toLowerCase()) ||
                k.toLowerCase().includes(lower.split('(')[0].trim().toLowerCase())
              );
            };

            // Try new store first — if it's already in the matrix, use its groups
            let matchedStore = findStore(newStoreName);
            let matchSource = 'new store (' + newStoreName + ')';

            // If new store isn't in the matrix, fall back to Sim Store
            if (!matchedStore && simStoreName) {
              matchedStore = findStore(simStoreName);
              matchSource = 'Sim Store fallback (' + simStoreName + ')';
            }

            if (matchedStore) {
              autoGroups = parsed.storeMatrix[matchedStore] || [];
            }

            onDataChange({
              ...data,
              storeTieringData: parsed,
              selectedGroups: autoGroups.length > 0 ? autoGroups : (data.selectedGroups || []),
              storeMatrixMatch: matchedStore ? { store: matchedStore, source: matchSource } : null,
              assignedTiers: (() => {
                // Helper: get store name from a tiering row (handles different header names)
                const getStoreName = (r) => {
                  for (const k of Object.keys(r)) {
                    if (k.toLowerCase().includes('store') || k.toLowerCase().includes('location')) {
                      return String(r[k] || '').trim().toLowerCase();
                    }
                  }
                  return String(Object.values(r)[0] || '').trim().toLowerCase();
                };

                // Helper: get effective tier from a tiering row (handles different header names)
                const getTier = (match) => {
                  if (!match) return '';
                  for (const k of Object.keys(match)) {
                    if (k.toLowerCase().includes('override') && k.toLowerCase().includes('tier')) {
                      const v = String(match[k] || '').trim();
                      if (v) return v;
                    }
                  }
                  for (const k of Object.keys(match)) {
                    if (k.toLowerCase().includes('proposed') && k.toLowerCase().includes('tier')) {
                      const v = String(match[k] || '').trim();
                      if (v) return v;
                    }
                  }
                  return '';
                };

                // Helper: find a store in division data and return its tier
                const findTierForStore = (name, divData) => {
                  if (!name || !Array.isArray(divData) || divData.length === 0) return '';
                  const lower = name.toLowerCase();
                  const match = divData.find(r => {
                    const s = getStoreName(r);
                    return s === lower || s.includes(lower) || lower.includes(s);
                  });
                  return getTier(match);
                };

                // Priority: try new store name first, fall back to sim store
                const newName = newStoreName;
                const simName = simStoreName;

                const getTierWithFallback = (divData) => {
                  const fromNew = findTierForStore(newName, divData);
                  if (fromNew) return fromNew;
                  return findTierForStore(simName, divData);
                };

                return {
                  mens: getTierWithFallback(parsed.mensData),
                  womens: getTierWithFallback(parsed.womensData),
                  nonApparel: getTierWithFallback(parsed.nonApparel),
                  kids: getTierWithFallback(parsed.kidsData),
                };
              })(),
              step2Complete: true,
            });
          } catch (error) {
            alert('Error parsing Store Tiering Tool: ' + error.message);
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const handleGroupToggle = (group) => {
        const currentGroups = data.selectedGroups || [];
        const updated = currentGroups.includes(group)
          ? currentGroups.filter(g => g !== group)
          : [...currentGroups, group];
        onDataChange({ ...data, selectedGroups: updated });
      };

      // Helper to get a store's effective tier — Override Tier takes precedence over Proposed Tier
      const getEffectiveTier = (row) => {
        const override = row['Override Tier'];
        if (override && String(override).trim() !== '') return String(override).trim();
        const proposed = row['Proposed Tier'];
        if (proposed && String(proposed).trim() !== '') return String(proposed).trim();
        return '';
      };

      const countTiers = (divData) => {
        const arr = divData || [];
        return {
          tier1: arr.filter(d => getEffectiveTier(d) === 'Tier 1').length,
          tier2: arr.filter(d => getEffectiveTier(d) === 'Tier 2').length,
          tier3: arr.filter(d => getEffectiveTier(d) === 'Tier 3').length,
          inspo: arr.filter(d => getEffectiveTier(d) === 'Inspo').length,
          total: arr.length,
        };
      };

      const tierCounts = useMemo(() => {
        return {
          mens: countTiers(data.storeTieringData.mensData),
          womens: countTiers(data.storeTieringData.womensData),
          nonApparel: countTiers(data.storeTieringData.nonApparel),
          kids: countTiers(data.storeTieringData.kidsData),
        };
      }, [data.storeTieringData]);

      // Default store groups to show when no Store Matrix sheet exists
      const defaultGroups = [
        'ALL STORES', 'ALL MINUS COOL CLIMATE', 'ALL MINUS HOT', 'BEACH', 'BEACH & INSPO',
        'COLD DOORS', 'COLDEST', 'FOOTWEAR DOORS', 'HOT', 'INSPO', 'KIDS DOORS',
        'MOUNTAIN', 'MOUNTAIN + REDWOOD', 'WARM DOORS', 'WARM + HOT',
        'MENS TIER 2+', 'MENS TIER 3+', 'WOMENS TIER 2+', 'WOMENS TIER 3+',
        'TREND', 'TOP AUR DOORS', 'BLANKET DOORS', 'ONLINE ONLY',
      ];

      const availableGroups = useMemo(() => {
        const matrixGroups = data.storeTieringData.storeGroups || [];
        return matrixGroups.length > 0 ? matrixGroups : defaultGroups;
      }, [data.storeTieringData.storeGroups]);

      return (
        <div className="space-y-8">
          <h2 className="text-2xl font-bold text-gray-800">Step 2: Store Tiering & Groups</h2>

          <div className="mb-8">
            <div className="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-gray-400 transition"
              onClick={() => fileInputRef.current?.click()}>
              <input
                ref={fileInputRef}
                type="file"
                accept=".xlsx"
                onChange={handleFileUpload}
                className="hidden"
              />
              <div className="text-lg font-semibold text-gray-700">Upload Store Tiering Tool (.xlsx)</div>
              <p className="text-sm text-gray-500 mt-2">Click or drag Store Tiering Tool file</p>
            </div>
          </div>

          {/* Tier Assignments — New Store vs Comp Stores */}
          <div className="bg-white rounded-lg shadow-md p-6">
            <h3 className="text-lg font-bold text-gray-800 mb-4">Division Tier Assignments</h3>
            <p className="text-sm text-gray-500 mb-4">Comp store tiers are pulled from the uploaded Store Tiering Tool. Assign tiers for the new store.</p>
            <div className="overflow-x-auto">
              <table className="w-full text-sm border-collapse">
                <thead>
                  <tr className="bg-gray-100 border-b-2 border-gray-300">
                    <th className="px-4 py-2 text-left text-xs font-bold text-gray-700" style={{width:'130px'}}>Division</th>
                    <th className="px-4 py-2 text-center text-xs font-bold text-blue-700 bg-blue-50">{data.proFormaData?.newStoreName || 'New Store'}</th>
                    {data.proFormaData?.compStoreName && (
                      <th className="px-4 py-2 text-center text-xs font-bold text-green-700 bg-green-50">{data.proFormaData.compStoreName}</th>
                    )}
                    {(data.proFormaData?.compStoreAnalysis || []).map((comp, idx) => {
                      const name = String(comp.compStore || '').trim();
                      if (!name || name === String(data.proFormaData?.compStoreName || '').trim()) return null;
                      return <th key={idx} className="px-4 py-2 text-center text-xs font-bold text-gray-700">{name}</th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {[
                    { key: 'mens', label: 'Mens', dataKey: 'mensData' },
                    { key: 'womens', label: 'Womens', dataKey: 'womensData' },
                    { key: 'nonApparel', label: 'Non Apparel', dataKey: 'nonApparel' },
                    { key: 'kids', label: 'Kids', dataKey: 'kidsData' },
                  ].map(div => {
                    // Lookup comp store tier from tiering data
                    const lookupTier = (storeName, divData) => {
                      if (!storeName || !Array.isArray(divData) || divData.length === 0) return '—';
                      const lower = storeName.toLowerCase();
                      const match = divData.find(r => {
                        let s = '';
                        for (const k of Object.keys(r)) {
                          if (k.toLowerCase().includes('store') || k.toLowerCase().includes('location')) {
                            s = String(r[k] || '').trim().toLowerCase();
                            break;
                          }
                        }
                        if (!s) s = String(Object.values(r)[0] || '').trim().toLowerCase();
                        return s === lower || s.includes(lower) || lower.includes(s);
                      });
                      if (!match) return '—';
                      for (const k of Object.keys(match)) {
                        if (k.toLowerCase().includes('override') && k.toLowerCase().includes('tier')) {
                          const v = String(match[k] || '').trim();
                          if (v) return v;
                        }
                      }
                      for (const k of Object.keys(match)) {
                        if (k.toLowerCase().includes('proposed') && k.toLowerCase().includes('tier')) {
                          const v = String(match[k] || '').trim();
                          if (v) return v;
                        }
                      }
                      return '—';
                    };

                    const td = data.storeTieringData || {};
                    const compName = String(data.proFormaData?.compStoreName || '').trim();
                    const compTier = lookupTier(compName, td[div.dataKey]);

                    return (
                      <tr key={div.key} className="border-b border-gray-200 hover:bg-gray-50">
                        <td className="px-4 py-2 font-semibold text-gray-800">{div.label}</td>
                        {/* New Store — dropdown */}
                        <td className="px-3 py-1.5 bg-blue-50">
                          <select
                            value={(data.assignedTiers || {})[div.key] || ''}
                            onChange={(e) => onDataChange({ ...data, assignedTiers: { ...(data.assignedTiers || {}), [div.key]: e.target.value } })}
                            className="w-full px-2 py-1 border border-gray-300 rounded text-xs text-center"
                          >
                            <option value="">-- Select --</option>
                            <option value="Tier 1">Tier 1</option>
                            <option value="Tier 2">Tier 2</option>
                            <option value="Tier 3">Tier 3</option>
                            <option value="Inspo">Inspo</option>
                          </select>
                        </td>
                        {/* Primary Comp Store — read-only from tiering data */}
                        {compName && (
                          <td className="px-4 py-2 text-center bg-green-50 font-semibold text-gray-700 text-xs">{compTier}</td>
                        )}
                        {/* Additional Comp Stores */}
                        {(data.proFormaData?.compStoreAnalysis || []).map((comp, idx) => {
                          const name = String(comp.compStore || '').trim();
                          if (!name || name === compName) return null;
                          const tier = lookupTier(name, td[div.dataKey]);
                          return <td key={idx} className="px-4 py-2 text-center font-semibold text-gray-700 text-xs">{tier}</td>;
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {/* Store Groups */}
          <div className="bg-white rounded-lg shadow-md p-6">
            <h3 className="text-lg font-bold text-gray-800 mb-4">Store Groups (Select applicable groups for new store)</h3>
            {data.storeMatrixMatch ? (
              <div className="mb-4 p-3 bg-green-50 border border-green-200 rounded-md">
                <p className="text-sm text-green-800">
                  {data.storeMatrixMatch.source.includes('fallback') ? (
                    <span>New store not found in Store Matrix. Groups pre-populated from <strong>{data.storeMatrixMatch.source}</strong>: "{data.storeMatrixMatch.store}"</span>
                  ) : (
                    <span>Groups pre-populated from Store Matrix for <strong>{data.storeMatrixMatch.store}</strong></span>
                  )}
                  {(data.selectedGroups || []).length > 0 && (
                    <span> — {(data.selectedGroups || []).length} group(s) selected</span>
                  )}
                </p>
              </div>
            ) : data.storeTieringData.storeGroups && data.storeTieringData.storeGroups.length > 0 ? (
              <p className="text-sm text-yellow-700 mb-4 p-3 bg-yellow-50 border border-yellow-200 rounded-md">
                Store Matrix loaded but neither the new store nor the Sim Store was found. Select groups manually.
              </p>
            ) : (
              <p className="text-sm text-gray-500 mb-4">
                No Store Matrix sheet found — showing default groups. Add a "Store Matrix" tab to your Store Tiering Tool to auto-populate.
              </p>
            )}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              {availableGroups.map((group, idx) => (
                <label key={idx} className="flex items-center space-x-3 cursor-pointer p-2 rounded hover:bg-gray-50">
                  <input
                    type="checkbox"
                    checked={(data.selectedGroups || []).includes(group)}
                    onChange={() => handleGroupToggle(group)}
                    className="w-4 h-4 text-blue-600 border-gray-300 rounded cursor-pointer"
                  />
                  <span className="text-sm text-gray-700">{group}</span>
                </label>
              ))}
            </div>
          </div>

          <div className="flex justify-between pt-8 border-t border-gray-200">
            <button
              onClick={() => onPrev(1)}
              className="px-6 py-2 bg-gray-400 text-white rounded-md font-semibold hover:bg-gray-500"
            >
              Previous
            </button>
            <button
              onClick={() => onNext(3)}
              className="px-6 py-2 bg-blue-600 text-white rounded-md font-semibold hover:bg-blue-700"
            >
              Next: Deliveries
            </button>
          </div>
        </div>
      );
    };

    // ============================================
    // STEP 3: DELIVERY SELECTION
    // ============================================

    const Step3 = ({ onNext, onPrev, onDataChange, data }) => {
      const fileInputRef = useRef(null);

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = parsePST(new Uint8Array(event.target.result));

            // Auto-select delivery months based on Opening Asst Qtr
            // Season → base months mapping (Faherty fiscal)
            const seasonMonths = {
              'Spring': ['february', 'march', 'april'],
              'Summer': ['may', 'june', 'july'],
              'Fall': ['august', 'september', 'october'],
              'Holiday': ['november', 'december', 'january'],
            };

            // Determine Opening Asst Qtr from opening date
            const openDateStr = data.proFormaData?.newStoreOpenDate || '';
            let asstQtr = '';
            if (openDateStr) {
              const d = (() => {
                const s = String(openDateStr).trim();
                if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s + 'T12:00:00');
                const parts = s.split('/');
                if (parts.length === 3) { let [m,dd,y] = parts.map(Number); if (y<100) y+=y<50?2000:1900; return new Date(y,m-1,dd); }
                return null;
              })();
              if (d) {
                const m = d.getMonth();
                if (m >= 1 && m <= 3) asstQtr = 'Spring';
                else if (m >= 4 && m <= 6) asstQtr = 'Summer';
                else if (m >= 7 && m <= 9) asstQtr = 'Fall';
                else asstQtr = 'Holiday';
              }
            }

            // Find all delivery months from PST that match the season
            let autoSelectedDeliveries = [];
            if (asstQtr && seasonMonths[asstQtr]) {
              const baseMonths = seasonMonths[asstQtr];
              const allDeliveryMonths = [...new Set(parsed.map(r => String(r.deliveryMonth || '').trim()).filter(Boolean))];
              autoSelectedDeliveries = allDeliveryMonths.filter(dm => {
                // Strip _2, _3 etc. to get base month, then lowercase compare
                const base = dm.replace(/_\d+$/, '').toLowerCase();
                return baseMonths.includes(base);
              });
            }

            onDataChange({
              ...data,
              pstData: parsed,
              selectedDeliveries: autoSelectedDeliveries.length > 0 ? autoSelectedDeliveries : (data.selectedDeliveries || []),
              step3Complete: true,
            });
          } catch (error) {
            alert('Error parsing PST: ' + error.message);
          }
        };
        reader.readAsArrayBuffer(file);
      };

      // Build season → delivery month mapping from actual PST data
      const seasonData = useMemo(() => {
        const seasons = {};
        (data.pstData || []).forEach(row => {
          const season = String(row.seasonCode || '').trim();
          const deliveryMonth = String(row.deliveryMonth || '').trim();
          if (!season || !deliveryMonth) return;

          if (!seasons[season]) {
            seasons[season] = { deliveries: {}, totalSKUs: 0 };
          }
          seasons[season].totalSKUs++;

          if (!seasons[season].deliveries[deliveryMonth]) {
            seasons[season].deliveries[deliveryMonth] = { skuCount: 0, categories: new Set() };
          }
          seasons[season].deliveries[deliveryMonth].skuCount++;
          if (row.category) seasons[season].deliveries[deliveryMonth].categories.add(row.category);
        });

        // Sort deliveries within each season in a logical order
        const monthOrder = ['January', 'February', 'March', 'April', 'May', 'May_2', 'June', 'June_2', 'July', 'July_2', 'August', 'August_2', 'September', 'September_2', 'October', 'October_2', 'November', 'December'];
        Object.keys(seasons).forEach(s => {
          const sorted = {};
          Object.keys(seasons[s].deliveries)
            .sort((a, b) => {
              const ai = monthOrder.indexOf(a);
              const bi = monthOrder.indexOf(b);
              return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
            })
            .forEach(k => { sorted[k] = seasons[s].deliveries[k]; });
          seasons[s].deliveries = sorted;
        });

        return seasons;
      }, [data.pstData]);

      const handleSeasonToggle = (season) => {
        const current = data.selectedDeliveries || [];
        const seasonDeliveries = Object.keys(seasonData[season]?.deliveries || {});
        const allSelected = seasonDeliveries.every(d => current.includes(d));

        let updated;
        if (allSelected) {
          updated = current.filter(d => !seasonDeliveries.includes(d));
        } else {
          const newSet = new Set([...current, ...seasonDeliveries]);
          updated = Array.from(newSet);
        }
        onDataChange({ ...data, selectedDeliveries: updated, selectedSeason: allSelected ? '' : season });
      };

      const handleDeliveryToggle = (delivery) => {
        const current = data.selectedDeliveries || [];
        const updated = current.includes(delivery)
          ? current.filter(d => d !== delivery)
          : [...current, delivery];
        onDataChange({ ...data, selectedDeliveries: updated });
      };

      const selectedSkuCount = useMemo(() => {
        if (!data.selectedDeliveries || data.selectedDeliveries.length === 0) return 0;
        return (data.pstData || []).filter(row => {
          const dm = String(row.deliveryMonth || '').trim();
          return data.selectedDeliveries.includes(dm);
        }).length;
      }, [data.pstData, data.selectedDeliveries]);

      return (
        <div className="space-y-8">
          <h2 className="text-2xl font-bold text-gray-800">Step 3: Delivery Selection</h2>

          <div className="mb-8">
            <div className="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-gray-400 transition"
              onClick={() => fileInputRef.current?.click()}>
              <input
                ref={fileInputRef}
                type="file"
                accept=".xlsx"
                onChange={handleFileUpload}
                className="hidden"
              />
              <div className="text-lg font-semibold text-gray-700">Upload PST (.xlsx)</div>
              <p className="text-sm text-gray-500 mt-2">Click or drag PST file</p>
            </div>
          </div>

          {/* Auto-selection info */}
          {(data.pstData || []).length > 0 && (data.selectedDeliveries || []).length > 0 && (() => {
            const openDateStr = data.proFormaData?.newStoreOpenDate || '';
            let asstQtr = '';
            if (openDateStr) {
              const d = (() => {
                const s = String(openDateStr).trim();
                if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s + 'T12:00:00');
                const parts = s.split('/');
                if (parts.length === 3) { let [m,dd,y] = parts.map(Number); if (y<100) y+=y<50?2000:1900; return new Date(y,m-1,dd); }
                return null;
              })();
              if (d) {
                const m = d.getMonth();
                if (m >= 1 && m <= 3) asstQtr = 'Spring';
                else if (m >= 4 && m <= 6) asstQtr = 'Summer';
                else if (m >= 7 && m <= 9) asstQtr = 'Fall';
                else asstQtr = 'Holiday';
              }
            }
            if (!asstQtr) return null;
            return (
              <div className="mb-4 p-3 bg-green-50 border border-green-200 rounded-md">
                <p className="text-sm text-green-800">
                  Delivery months auto-selected for <strong>{asstQtr}</strong> season based on Opening Asst Qtr. You can manually add or remove months below.
                </p>
              </div>
            );
          })()}

          {/* Season-based Delivery Selection */}
          {Object.keys(seasonData).length > 0 ? (
            <div className="space-y-6">
              {Object.entries(seasonData).map(([season, sData]) => {
                const monthKeys = Object.keys(sData.deliveries);
                const currentSelected = data.selectedDeliveries || [];
                const allChecked = monthKeys.length > 0 && monthKeys.every(d => currentSelected.includes(d));
                const someChecked = monthKeys.some(d => currentSelected.includes(d));
                const checkedCount = monthKeys.filter(d => currentSelected.includes(d)).length;

                return (
                  <div key={season} className="bg-white rounded-lg shadow-md overflow-hidden">
                    {/* Season Header — click to select/deselect all */}
                    <div
                      className={`p-5 cursor-pointer flex items-center justify-between ${allChecked ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-800 hover:bg-gray-200'}`}
                      onClick={() => handleSeasonToggle(season)}
                    >
                      <div className="flex items-center space-x-4">
                        <input
                          type="checkbox"
                          checked={allChecked}
                          readOnly
                          className="w-5 h-5 rounded cursor-pointer"
                        />
                        <div>
                          <h3 className="text-lg font-bold">{season}</h3>
                          <p className={`text-sm ${allChecked ? 'text-blue-100' : 'text-gray-500'}`}>
                            {monthKeys.length} delivery months · {sData.totalSKUs} total SKUs
                          </p>
                        </div>
                      </div>
                      <span className="text-sm font-semibold">{allChecked ? 'All Selected' : someChecked ? checkedCount + '/' + monthKeys.length + ' selected' : 'Click to select'}</span>
                    </div>

                    {/* Individual Delivery Months */}
                    <div className="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                      {monthKeys.map(month => (
                        <label key={month} className={`flex items-start space-x-3 p-3 border rounded-lg cursor-pointer transition ${currentSelected.includes(month) ? 'border-blue-400 bg-blue-50' : 'border-gray-200 hover:bg-gray-50'}`}>
                          <input
                            type="checkbox"
                            checked={currentSelected.includes(month)}
                            onChange={() => handleDeliveryToggle(month)}
                            className="w-4 h-4 text-blue-600 border-gray-300 rounded cursor-pointer mt-0.5"
                          />
                          <div className="flex-1 min-w-0">
                            <div className="font-semibold text-gray-800 text-sm">{month}</div>
                            <div className="text-xs text-gray-500">{sData.deliveries[month].skuCount} SKUs</div>
                            <div className="text-xs text-gray-400 truncate">{Array.from(sData.deliveries[month].categories).join(', ')}</div>
                          </div>
                        </label>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          ) : (
            <div className="bg-gray-50 rounded-lg p-8 text-center text-gray-500">
              Upload a PST file to see available seasons and deliveries.
            </div>
          )}

          {/* Summary */}
          {(data.selectedDeliveries || []).length > 0 && (
            <div className="bg-blue-50 border border-blue-200 rounded-lg p-6">
              <h3 className="text-lg font-bold text-gray-800 mb-2">Selection Summary</h3>
              <div className="text-sm text-gray-700 space-y-1">
                <p>Selected delivery months: <span className="font-semibold">{(data.selectedDeliveries || []).join(', ')}</span></p>
                <p>Total SKUs in selection: <span className="font-bold text-lg text-blue-700">{selectedSkuCount}</span></p>
              </div>
            </div>
          )}

          <div className="flex justify-between pt-8 border-t border-gray-200">
            <button
              onClick={() => onPrev(2)}
              className="px-6 py-2 bg-gray-400 text-white rounded-md font-semibold hover:bg-gray-500"
            >
              Previous
            </button>
            <button
              onClick={() => onNext(4)}
              className="px-6 py-2 bg-blue-600 text-white rounded-md font-semibold hover:bg-blue-700"
            >
              Next: Assortment Builder
            </button>
          </div>
        </div>
      );
    };

    // ============================================
    // STEP 4: ASSORTMENT REVIEW (Combined Builder + Merchant Review)
    // ============================================

    const Step4 = ({ onNext, onPrev, onDataChange, data }) => {
      const [page, setPage] = useState(0);
      const [filters, setFilters] = useState({
        sku: [],
        styleDescription: [],
        colorDescription: [],
        department: [],
        category: [],
        subcategory: [],
        deliveryMonth: [],
        storeTier: [],
        seasonalLifeCycle: [],
        mdExitWeek: [],
        action: [],
        notes: [],
      });
      const setFilter = (key, val) => { setFilters(f => ({ ...f, [key]: val })); setPage(0); };

      // All state declarations first (before any useMemo that references them)
      const [selectedRows, setSelectedRows] = useState(new Set());
      const [skuActions, setSkuActions] = useState(data.skuActions || {});
      const [skuNotes, setSkuNotes] = useState(data.skuNotes || {});
      const [divisionSignoffs, setDivisionSignoffs] = useState(data.divisionSignoffs || {});
      const [skuTargets, setSkuTargets] = useState(data.skuTargets || {});
      const [addSkuInput, setAddSkuInput] = useState('');
      const [addedSkus, setAddedSkus] = useState(data.addedSkus || []);
      const [addSkuError, setAddSkuError] = useState('');

      // Build base data (delivery month + store group match + manually added SKUs)
      const baseData = useMemo(() => {
        const selectedDeliveries = data.selectedDeliveries || [];
        const selectedGroups = data.selectedGroups || [];
        const matched = (data.pstData || []).filter(row => {
          const dm = String(row.deliveryMonth || '').trim();
          const matchesDelivery = selectedDeliveries.length === 0 ||
            selectedDeliveries.includes(dm);
          const matchesTier = selectedGroups.length === 0 ||
            selectedGroups.includes(row.storeTier) ||
            row.storeTier === 'ALL STORES';
          return matchesDelivery && matchesTier;
        });
        // Merge in manually added SKUs (avoid duplicates)
        const matchedSkus = new Set(matched.map(r => r.sku));
        const extras = addedSkus.filter(r => !matchedSkus.has(r.sku));
        return [...matched, ...extras];
      }, [data.pstData, data.selectedDeliveries, data.selectedGroups, addedSkus]);

      const uniqueVals = useMemo(() => ({
        sku: [...new Set(baseData.map(r => r.sku).filter(Boolean))].sort(),
        styleDescription: [...new Set(baseData.map(r => r.styleDescription).filter(Boolean))].sort(),
        colorDescription: [...new Set(baseData.map(r => r.colorDescription).filter(Boolean))].sort(),
        department: [...new Set(baseData.map(r => r.department).filter(Boolean))].sort(),
        category: [...new Set(baseData.map(r => r.category).filter(Boolean))].sort(),
        subcategory: [...new Set(baseData.map(r => r.subcategory).filter(Boolean))].sort(),
        deliveryMonth: [...new Set(baseData.map(r => r.deliveryMonth).filter(Boolean))].sort(),
        storeTier: [...new Set(baseData.map(r => r.storeTier).filter(Boolean))].sort(),
        seasonalLifeCycle: [...new Set(baseData.map(r => r.seasonalLifeCycle).filter(Boolean))].sort(),
        mdExitWeek: [...new Set(baseData.map(r => r.mdExitWeek).filter(Boolean))].sort(),
        notes: [...new Set(baseData.map(r => skuNotes[r.sku]).filter(Boolean))].sort(),
      }), [baseData, skuNotes]);

      // Keep these for backward compat with summary stats
      const departments = uniqueVals.department;
      const categories = uniqueVals.category;
      const subcategories = uniqueVals.subcategory;
      const storeTiers = uniqueVals.storeTier;

      // Apply column filters on top of base data
      const filteredData = useMemo(() => {
        return baseData.filter(row => {
          if (filters.sku.length && !filters.sku.includes(row.sku)) return false;
          if (filters.styleDescription.length && !filters.styleDescription.includes(row.styleDescription)) return false;
          if (filters.colorDescription.length && !filters.colorDescription.includes(row.colorDescription)) return false;
          if (filters.department.length && !filters.department.includes(row.department)) return false;
          if (filters.category.length && !filters.category.includes(row.category)) return false;
          if (filters.subcategory.length && !filters.subcategory.includes(row.subcategory)) return false;
          if (filters.deliveryMonth.length && !filters.deliveryMonth.includes(row.deliveryMonth)) return false;
          if (filters.storeTier.length && !filters.storeTier.includes(row.storeTier)) return false;
          if (filters.seasonalLifeCycle.length && !filters.seasonalLifeCycle.includes(row.seasonalLifeCycle)) return false;
          if (filters.mdExitWeek.length && !filters.mdExitWeek.includes(row.mdExitWeek)) return false;
          if (filters.action.length) {
            const act = skuActions[row.sku] || 'Keep';
            if (!filters.action.includes(act)) return false;
          }
          if (filters.notes.length) {
            const note = skuNotes[row.sku] || '';
            if (!filters.notes.includes(note)) return false;
          }
          return true;
        });
      }, [baseData, filters, skuActions, skuNotes]);

      const pageSize = 50;
      const sortedData = useMemo(() => {
        return [...filteredData].sort((a, b) => {
          return (a.department || '').localeCompare(b.department || '')
            || (a.category || '').localeCompare(b.category || '')
            || (a.subcategory || '').localeCompare(b.subcategory || '')
            || (a.styleDescription || '').localeCompare(b.styleDescription || '')
            || (a.colorDescription || '').localeCompare(b.colorDescription || '');
        });
      }, [filteredData]);
      const paginatedData = sortedData.slice(page * pageSize, (page + 1) * pageSize);

      const summaryStats = useMemo(() => {
        const deptBreakdown = {};
        filteredData.forEach(row => {
          deptBreakdown[row.department] = (deptBreakdown[row.department] || 0) + 1;
        });
        return {
          totalSKUs: filteredData.length,
          deptBreakdown,
        };
      }, [filteredData]);

      const summary = useMemo(() => {
        let keeps = 0, drops = 0, adds = 0;
        filteredData.forEach(row => {
          const action = skuActions[row.sku] || 'Keep';
          if (action === 'Keep') keeps++;
          else if (action === 'Drop') drops++;
          else if (action === 'Add') adds++;
        });
        return { total: filteredData.length, keeps, drops, adds, net: keeps + adds };
      }, [skuActions, filteredData]);

      const handleRowSelect = (idx) => {
        const updated = new Set(selectedRows);
        if (updated.has(idx)) updated.delete(idx);
        else updated.add(idx);
        setSelectedRows(updated);
      };

      const handleBulkAction = (action) => {
        const newActions = { ...skuActions };
        selectedRows.forEach(idx => {
          const sku = paginatedData[idx]?.sku;
          if (sku) newActions[sku] = action;
        });
        setSkuActions(newActions);
        setSelectedRows(new Set());
      };

      const handleActionChange = (sku, action) => {
        setSkuActions({ ...skuActions, [sku]: action });
      };

      const handleNoteChange = (sku, note) => {
        setSkuNotes({ ...skuNotes, [sku]: note });
      };

      const handleAddSku = () => {
        const input = addSkuInput.trim();
        if (!input) return;
        setAddSkuError('');

        // Support comma-separated or space-separated SKU entry
        const skusToAdd = input.split(/[,\s]+/).map(s => s.trim()).filter(Boolean);
        const allPst = data.pstData || [];
        const newAdded = [...addedSkus];
        const errors = [];

        skusToAdd.forEach(skuVal => {
          // Check if already in the assortment
          const alreadyInBase = baseData.find(r => r.sku === skuVal);
          const alreadyAdded = newAdded.find(r => r.sku === skuVal);
          if (alreadyInBase || alreadyAdded) {
            errors.push(skuVal + ' already in assortment');
            return;
          }
          // Look up in full PST data
          const found = allPst.find(r => r.sku === skuVal);
          if (found) {
            newAdded.push({ ...found });
            setSkuActions(prev => ({ ...prev, [skuVal]: 'Add' }));
          } else {
            errors.push(skuVal + ' not found in PST');
          }
        });

        setAddedSkus(newAdded);
        setAddSkuInput('');
        if (errors.length > 0) {
          setAddSkuError(errors.join('; '));
        }
      };

      // Net SKU count per department (Keep + Add only, from baseData not filteredData)
      const netByDept = useMemo(() => {
        const counts = {};
        let totalNet = 0;
        baseData.forEach(row => {
          const dept = row.department || 'Other';
          const action = skuActions[row.sku] || 'Keep';
          if (action !== 'Drop') {
            counts[dept] = (counts[dept] || 0) + 1;
            totalNet++;
          }
        });
        counts['__total__'] = totalNet;
        return counts;
      }, [baseData, skuActions]);

      const handleSignoff = (division) => {
        const now = new Date();
        const timestamp = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
        const name = prompt('Enter your name for sign-off:');
        if (!name) return;
        const updated = {
          ...divisionSignoffs,
          [division]: [...(divisionSignoffs[division] || []), { name, date: timestamp }],
        };
        setDivisionSignoffs(updated);
        onDataChange({ ...data, divisionSignoffs: updated });
      };

      const handleExport = () => {
        const exportData = sortedData.map(row => ({
          SKU: row.sku,
          Division: row.department,
          Category: row.category,
          Subcategory: row.subcategory,
          'Style Description': row.styleDescription,
          'Color Description': row.colorDescription,
          'Seasonal LC': row.seasonalLifeCycle,
          'Delivery Month': row.deliveryMonth,
          'Store Tier': row.storeTier,
          'MD Exit Week': row.mdExitWeek,
          Action: skuActions[row.sku] || 'Keep',
          Notes: skuNotes[row.sku] || '',
        }));
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Assortment Review');
        XLSX.writeFile(wb, 'assortment-review.xlsx');
      };

      // Division-level counts for sign-off section
      const divisionCounts = useMemo(() => {
        const counts = {};
        filteredData.forEach(row => {
          const dept = row.department || 'Other';
          if (!counts[dept]) counts[dept] = { total: 0, keeps: 0, drops: 0, adds: 0 };
          counts[dept].total++;
          const action = skuActions[row.sku] || 'Keep';
          if (action === 'Keep') counts[dept].keeps++;
          else if (action === 'Drop') counts[dept].drops++;
          else if (action === 'Add') counts[dept].adds++;
        });
        return counts;
      }, [filteredData, skuActions]);

      return (
        <div className="space-y-6">
          <h2 className="text-2xl font-bold text-gray-800">Step 4: Assortment Review</h2>

          {/* SKU Target & Variance Summary */}
          <div className="bg-white rounded-lg shadow-md p-5">
            <h3 className="text-sm font-bold text-gray-800 mb-4">SKU Targets & Variance</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-sm border-collapse">
                <thead>
                  <tr className="border-b-2 border-gray-300 bg-gray-50">
                    <th className="px-3 py-2 text-left text-xs font-bold text-gray-600"></th>
                    {departments.map(dept => (
                      <th key={dept} className="px-3 py-2 text-center text-xs font-bold text-gray-700">{dept}</th>
                    ))}
                    <th className="px-3 py-2 text-center text-xs font-bold text-gray-900 bg-gray-100">TOTAL</th>
                  </tr>
                </thead>
                <tbody>
                  <tr className="border-b border-gray-200">
                    <td className="px-3 py-2 text-xs font-semibold text-gray-600">Target</td>
                    {departments.map(dept => (
                      <td key={dept} className="px-3 py-1 text-center">
                        <input
                          type="number"
                          value={skuTargets[dept] || ''}
