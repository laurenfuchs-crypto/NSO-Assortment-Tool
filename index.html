                          onChange={(e) => { const v = e.target.value; const updated = {...skuTargets, [dept]: v}; setSkuTargets(updated); onDataChange({...data, skuTargets: updated}); }}
                          placeholder="—"
                          className="w-16 px-1 py-1 border border-gray-300 rounded text-xs text-center"
                        />
                      </td>
                    ))}
                    <td className="px-3 py-2 text-center bg-gray-50 text-xs font-bold text-gray-900">
                      {departments.reduce((sum, dept) => sum + (parseInt(skuTargets[dept]) || 0), 0) || '—'}
                    </td>
                  </tr>
                  <tr className="border-b border-gray-200">
                    <td className="px-3 py-2 text-xs font-semibold text-gray-600">Net SKUs</td>
                    {departments.map(dept => (
                      <td key={dept} className="px-3 py-2 text-center text-xs font-bold">{netByDept[dept] || 0}</td>
                    ))}
                    <td className="px-3 py-2 text-center text-xs font-bold bg-gray-50">{netByDept['__total__'] || 0}</td>
                  </tr>
                  <tr>
                    <td className="px-3 py-2 text-xs font-semibold text-gray-600">Variance</td>
                    {departments.map(dept => {
                      const target = parseInt(skuTargets[dept]) || 0;
                      const net = netByDept[dept] || 0;
                      const variance = target ? net - target : null;
                      return (
                        <td key={dept} className="px-3 py-2 text-center">
                          {variance !== null ? (
                            <span className={`text-xs font-bold ${variance > 0 ? 'text-red-600' : variance < 0 ? 'text-orange-500' : 'text-green-600'}`}>
                              {variance > 0 ? '+' : ''}{variance}
                            </span>
                          ) : <span className="text-xs text-gray-300">—</span>}
                        </td>
                      );
                    })}
                    {(() => {
                      const totalTarget = departments.reduce((sum, dept) => sum + (parseInt(skuTargets[dept]) || 0), 0);
                      const totalNet = netByDept['__total__'] || 0;
                      const totalVar = totalTarget ? totalNet - totalTarget : null;
                      return (
                        <td className="px-3 py-2 text-center bg-gray-50">
                          {totalVar !== null ? (
                            <span className={`text-xs font-bold ${totalVar > 0 ? 'text-red-600' : totalVar < 0 ? 'text-orange-500' : 'text-green-600'}`}>
                              {totalVar > 0 ? '+' : ''}{totalVar}
                            </span>
                          ) : <span className="text-xs text-gray-300">—</span>}
                        </td>
                      );
                    })()}
                  </tr>
                </tbody>
              </table>
            </div>
            <div className="mt-3 flex gap-4 text-xs text-gray-500">
              <span>Total SKUs in assortment: <strong className="text-gray-800">{summary.total}</strong></span>
              <span>Keeps: <strong className="text-green-600">{summary.keeps}</strong></span>
              <span>Drops: <strong className="text-red-600">{summary.drops}</strong></span>
              <span>Net: <strong className="text-purple-600">{summary.net}</strong></span>
            </div>
          </div>

          {/* Add SKU + Bulk Actions + Export */}
          <div className="bg-white rounded-lg shadow-md p-3 space-y-2">
            <div className="flex items-center gap-2">
              <span className="text-xs font-semibold text-gray-600 whitespace-nowrap">Add SKU:</span>
              <input
                type="text"
                value={addSkuInput}
                onChange={(e) => { setAddSkuInput(e.target.value); setAddSkuError(''); }}
                onKeyDown={(e) => { if (e.key === 'Enter') handleAddSku(); }}
                placeholder="Enter SKU(s) — comma or space separated"
                className="flex-1 px-2 py-1.5 border border-gray-300 rounded text-xs"
              />
              <button onClick={handleAddSku} className="px-3 py-1.5 bg-green-600 text-white rounded text-xs font-semibold hover:bg-green-700 whitespace-nowrap">+ Add</button>
              {addSkuError && <span className="text-xs text-red-500">{addSkuError}</span>}
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              <button onClick={() => handleBulkAction('Keep')} disabled={selectedRows.size === 0} className="px-3 py-1.5 bg-green-600 text-white rounded text-xs font-semibold hover:bg-green-700 disabled:bg-gray-300 disabled:cursor-not-allowed">Keep ({selectedRows.size})</button>
              <button onClick={() => handleBulkAction('Drop')} disabled={selectedRows.size === 0} className="px-3 py-1.5 bg-red-600 text-white rounded text-xs font-semibold hover:bg-red-700 disabled:bg-gray-300 disabled:cursor-not-allowed">Drop ({selectedRows.size})</button>
              <div className="flex-1" />
              {Object.values(filters).some(v => v && v.length > 0) && (
                <button onClick={() => { setFilters({ sku:[], styleDescription:[], colorDescription:[], department:[], category:[], subcategory:[], deliveryMonth:[], storeTier:[], seasonalLifeCycle:[], mdExitWeek:[], action:[], notes:[] }); setPage(0); }} className="px-3 py-1.5 bg-yellow-500 text-white rounded text-xs font-semibold hover:bg-yellow-600">Clear All Filters</button>
              )}
              <button onClick={handleExport} className="px-3 py-1.5 bg-gray-700 text-white rounded text-xs font-semibold hover:bg-gray-800">Export Excel</button>
            </div>
          </div>

          {/* Assortment Review Table with Inline Filters */}
          <div className="bg-white rounded-lg shadow-md p-4">
            <div className="text-sm text-gray-600 mb-2">Showing {Math.min(page * pageSize + 1, filteredData.length)}-{Math.min((page + 1) * pageSize, filteredData.length)} of {filteredData.length}</div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm border-collapse">
                <thead>
                  {/* Header row */}
                  <tr className="bg-gray-100 border-b border-gray-300">
                    <th className="px-1 py-1.5 text-left" style={{width:'30px'}}><input type="checkbox" onChange={(e) => { e.target.checked ? setSelectedRows(new Set(paginatedData.map((_, i) => i))) : setSelectedRows(new Set()); }} className="w-3.5 h-3.5" /></th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">SKU</th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">Division</th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">Category</th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">Subcategory</th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">Style Description</th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">Color Description</th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">Seasonal LC</th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">Delivery</th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">Store Tier</th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">MD Exit Wk</th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">Action</th>
                    <th className="px-1 py-1.5 text-left text-xs font-bold">Notes</th>
                  </tr>
                  {/* Filter row */}
                  <tr className="bg-gray-50 border-b-2 border-gray-300">
                    <th className="px-1 py-1"></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={uniqueVals.sku} selected={filters.sku} onChange={(v) => setFilter('sku', v)} /></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={uniqueVals.department} selected={filters.department} onChange={(v) => setFilter('department', v)} /></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={uniqueVals.category} selected={filters.category} onChange={(v) => setFilter('category', v)} /></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={uniqueVals.subcategory} selected={filters.subcategory} onChange={(v) => setFilter('subcategory', v)} /></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={uniqueVals.styleDescription} selected={filters.styleDescription} onChange={(v) => setFilter('styleDescription', v)} /></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={uniqueVals.colorDescription} selected={filters.colorDescription} onChange={(v) => setFilter('colorDescription', v)} /></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={uniqueVals.seasonalLifeCycle} selected={filters.seasonalLifeCycle} onChange={(v) => setFilter('seasonalLifeCycle', v)} /></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={uniqueVals.deliveryMonth} selected={filters.deliveryMonth} onChange={(v) => setFilter('deliveryMonth', v)} /></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={uniqueVals.storeTier} selected={filters.storeTier} onChange={(v) => setFilter('storeTier', v)} /></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={uniqueVals.mdExitWeek} selected={filters.mdExitWeek} onChange={(v) => setFilter('mdExitWeek', v)} /></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={['Keep', 'Drop', 'Add']} selected={filters.action} onChange={(v) => setFilter('action', v)} /></th>
                    <th className="px-1 py-1"><MultiSelectFilter options={uniqueVals.notes} selected={filters.notes} onChange={(v) => setFilter('notes', v)} /></th>
                  </tr>
                </thead>
                <tbody>
                  {paginatedData.map((row, idx) => {
                    const action = skuActions[row.sku] || 'Keep';
                    const bgColor = action === 'Drop' ? 'bg-red-50' : action === 'Add' ? 'bg-green-50' : idx % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                    return (
                      <tr key={idx} className={`${bgColor} border-b border-gray-200`}>
                        <td className="px-2 py-1.5"><input type="checkbox" checked={selectedRows.has(idx)} onChange={() => handleRowSelect(idx)} className="w-3.5 h-3.5" /></td>
                        <td className="px-2 py-1.5 text-xs font-mono">{row.sku}</td>
                        <td className="px-2 py-1.5 text-xs">{row.department}</td>
                        <td className="px-2 py-1.5 text-xs">{row.category}</td>
                        <td className="px-2 py-1.5 text-xs">{row.subcategory}</td>
                        <td className="px-2 py-1.5 text-xs">{row.styleDescription}</td>
                        <td className="px-2 py-1.5 text-xs">{row.colorDescription}</td>
                        <td className="px-2 py-1.5 text-xs">{row.seasonalLifeCycle}</td>
                        <td className="px-2 py-1.5 text-xs">{row.deliveryMonth}</td>
                        <td className="px-2 py-1.5 text-xs">{row.storeTier}</td>
                        <td className="px-2 py-1.5 text-xs">{row.mdExitWeek}</td>
                        <td className="px-2 py-1.5"><select value={action} onChange={(e) => handleActionChange(row.sku, e.target.value)} className="px-1 py-0.5 border border-gray-300 rounded text-xs"><option value="Keep">Keep</option><option value="Drop">Drop</option><option value="Add">Add</option></select></td>
                        <td className="px-2 py-1.5"><input type="text" value={skuNotes[row.sku] || ''} onChange={(e) => handleNoteChange(row.sku, e.target.value)} placeholder="Notes..." className="w-full px-1 py-0.5 border border-gray-300 rounded text-xs" /></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div className="flex justify-between items-center mt-3">
              <button onClick={() => setPage(Math.max(0, page - 1))} disabled={page === 0} className="px-3 py-1.5 bg-gray-400 text-white rounded text-xs font-semibold hover:bg-gray-500 disabled:bg-gray-300 disabled:cursor-not-allowed">Prev Page</button>
              <span className="text-xs text-gray-600">Page {page + 1} of {Math.max(1, Math.ceil(filteredData.length / pageSize))}</span>
              <button onClick={() => setPage(Math.min(Math.ceil(filteredData.length / pageSize) - 1, page + 1))} disabled={page >= Math.ceil(filteredData.length / pageSize) - 1} className="px-3 py-1.5 bg-gray-400 text-white rounded text-xs font-semibold hover:bg-gray-500 disabled:bg-gray-300 disabled:cursor-not-allowed">Next Page</button>
            </div>
          </div>

          {/* Division Sign-Off Section */}
          <div className="bg-white rounded-lg shadow-md p-6">
            <h3 className="text-lg font-bold text-gray-800 mb-4">Division Sign-Off</h3>
            <p className="text-sm text-gray-500 mb-4">Each division must be reviewed and signed off before proceeding to the Depth Review.</p>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {Object.entries(divisionCounts).map(([dept, counts]) => {
                const signoffs = divisionSignoffs[dept] || [];
                const isSigned = signoffs.length > 0;
                return (
                  <div key={dept} className={`border-2 rounded-lg p-4 ${isSigned ? 'border-green-400 bg-green-50' : 'border-gray-200'}`}>
                    <div className="flex justify-between items-start mb-3">
                      <div>
                        <h4 className="font-bold text-gray-800">{dept}</h4>
                        <div className="text-xs text-gray-500 mt-1">
                          {counts.total} SKUs · {counts.keeps} keep · {counts.drops} drop · {counts.adds} add
                        </div>
                      </div>
                      {isSigned && <span className="text-green-600 text-lg font-bold">✓</span>}
                    </div>
                    {signoffs.length > 0 && (
                      <div className="mb-3 space-y-1">
                        {signoffs.map((s, i) => (
                          <div key={i} className="text-xs text-gray-600 bg-white rounded px-2 py-1 border border-gray-200">
                            <span className="font-semibold">{s.name}</span> — {s.date}
                          </div>
                        ))}
                      </div>
                    )}
                    <button
                      onClick={() => handleSignoff(dept)}
                      className={`w-full px-3 py-2 rounded text-sm font-semibold ${isSigned ? 'bg-green-100 text-green-700 border border-green-300 hover:bg-green-200' : 'bg-blue-600 text-white hover:bg-blue-700'}`}
                    >
                      {isSigned ? 'Add Additional Sign-Off' : 'Sign Off on ' + dept}
                    </button>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="flex justify-between pt-6 border-t border-gray-200">
            <button onClick={() => onPrev(3)} className="px-6 py-2 bg-gray-400 text-white rounded-md font-semibold hover:bg-gray-500">Previous</button>
            <button
              onClick={() => { onDataChange({ ...data, skuActions, skuNotes, divisionSignoffs, skuTargets, addedSkus }); onNext(5); }}
              className="px-6 py-2 bg-blue-600 text-white rounded-md font-semibold hover:bg-blue-700"
            >
              Next: Depth Review
            </button>
          </div>
        </div>
      );
    };

    // ============================================
    // STEP 5: DEPTH REVIEW RECAP
    // ============================================

    const Step5 = ({ onNext, onPrev, data }) => {
      const [depthTargets, setDepthTargets] = useState(data.skuTargets || {});
      const [depthNotes, setDepthNotes] = useState({});
      const [reservedUnits, setReservedUnits] = useState({});  // SKU → total quantity
      const [reservedLoaded, setReservedLoaded] = useState(false);
      const reservedFileRef = useRef(null);

      const handleReservedUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const wb = XLSX.read(new Uint8Array(event.target.result), { type: 'array' });
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const rawData = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            // Find header row with "Sku" and "Quantity"
            let headerIdx = 0;
            for (let i = 0; i < Math.min(5, rawData.length); i++) {
              const rowStr = (rawData[i] || []).map(c => String(c || '').toLowerCase()).join('|');
              if (rowStr.includes('sku') && rowStr.includes('quantity')) { headerIdx = i; break; }
            }
            const headers = (rawData[headerIdx] || []).map(h => String(h || '').trim().toLowerCase());
            const skuCol = headers.findIndex(h => h === 'sku');
            const qtyCol = headers.findIndex(h => h === 'quantity');

            if (skuCol < 0 || qtyCol < 0) {
              alert('Could not find SKU and Quantity columns in the Reserved Units file.');
              return;
            }

            // Sum quantity by SKU
            const units = {};
            for (let i = headerIdx + 1; i < rawData.length; i++) {
              const row = rawData[i];
              if (!Array.isArray(row)) continue;
              const sku = String(row[skuCol] || '').trim();
              const qty = parseInt(row[qtyCol]) || 0;
              if (sku) units[sku] = (units[sku] || 0) + qty;
            }
            setReservedUnits(units);
            setReservedLoaded(true);
          } catch (error) {
            alert('Error parsing Reserved Units file: ' + error.message);
          }
        };
        reader.readAsArrayBuffer(file);
      };

      // Use the EXACT same data as the Assortment Review:
      // delivery month + store group filter + manually added SKUs
      const filteredData = useMemo(() => {
        const selectedDeliveries = data.selectedDeliveries || [];
        const selectedGroups = data.selectedGroups || [];
        const addedSkus = data.addedSkus || [];

        const matched = (data.pstData || []).filter(row => {
          const dm = String(row.deliveryMonth || '').trim();
          const matchesDelivery = selectedDeliveries.length === 0 ||
            selectedDeliveries.includes(dm);
          const matchesTier = selectedGroups.length === 0 ||
            selectedGroups.includes(row.storeTier) ||
            row.storeTier === 'ALL STORES';
          return matchesDelivery && matchesTier;
        });

        // Merge in manually added SKUs from Assortment Review
        const matchedSkus = new Set(matched.map(r => r.sku));
        const extras = addedSkus.filter(r => !matchedSkus.has(r.sku));
        return [...matched, ...extras];
      }, [data.pstData, data.selectedDeliveries, data.selectedGroups, data.addedSkus]);

      // Build depth review data — rows for divisions and categories
      // Units come from the Reserved Units file, not the PST
      const depthRows = useMemo(() => {
        const skuActions = data.skuActions || {};
        const rows = [];
        const divisionOrder = ['Mens', 'Womens', 'Non Apparel', 'Kids', 'Accessories'];
        const deptMap = {};

        filteredData.forEach(row => {
          const action = skuActions[row.sku] || 'Keep';
          if (action === 'Drop') return;
          const dept = row.department || 'Other';
          const cat = row.category || 'Other';
          if (!deptMap[dept]) deptMap[dept] = { skus: 0, units: 0, cats: {} };
          if (!deptMap[dept].cats[cat]) deptMap[dept].cats[cat] = { skus: 0, units: 0 };
          deptMap[dept].skus++;
          deptMap[dept].cats[cat].skus++;
          // Units from Reserved Units file (summed by SKU)
          const units = reservedUnits[row.sku] || 0;
          deptMap[dept].units += units;
          deptMap[dept].cats[cat].units += units;
        });

        let totalSkus = 0, totalUnits = 0;
        Object.values(deptMap).forEach(d => { totalSkus += d.skus; totalUnits += d.units; });

        // Build ordered rows
        const orderedDepts = Object.keys(deptMap).sort((a, b) => {
          const ai = divisionOrder.indexOf(a);
          const bi = divisionOrder.indexOf(b);
          return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        });

        orderedDepts.forEach(dept => {
          const d = deptMap[dept];
          rows.push({
            key: dept,
            label: dept.toUpperCase(),
            isDivision: true,
            skus: d.skus,
            units: d.units,
            pctSku: totalSkus > 0 ? ((d.skus / totalSkus) * 100).toFixed(0) + '%' : '0%',
          });
          const cats = Object.keys(d.cats).sort();
          cats.forEach(cat => {
            const c = d.cats[cat];
            rows.push({
              key: dept + '|' + cat,
              label: cat,
              isDivision: false,
              parentDept: dept,
              skus: c.skus,
              units: c.units,
              pctSku: totalSkus > 0 ? ((c.skus / totalSkus) * 100).toFixed(0) + '%' : '0%',
            });
          });
        });

        return { rows, totalSkus, totalUnits };
      }, [filteredData, data.skuActions, reservedUnits]);

      // Sim store name for comparison column
      const simStoreName = data.simStore || data.proFormaData?.compStoreName || 'Sim Store';
      const newStoreName = data.proFormaData?.newStoreName || 'New Store';

      // Look up Sim Store tiers from the Store Tiering Tool division sheets
      const simStoreTiers = useMemo(() => {
        const tiers = { mens: '—', womens: '—', nonApparel: '—', kids: '—' };
        const td = data.storeTieringData || {};
        const simName = (data.simStore || '').toLowerCase();
        if (!simName) return tiers;

        const findTier = (divData) => {
          if (!Array.isArray(divData)) return '—';
          const match = divData.find(r => {
            const store = String(r['Store'] || r['store'] || '').toLowerCase();
            return store === simName || store.includes(simName) || simName.includes(store);
          });
          if (!match) return '—';
          const override = match['Override Tier'];
          if (override && String(override).trim()) return String(override).trim();
          const proposed = match['Proposed Tier'];
          if (proposed && String(proposed).trim()) return String(proposed).trim();
          return '—';
        };

        tiers.mens = findTier(td.mensData);
        tiers.womens = findTier(td.womensData);
        tiers.nonApparel = findTier(td.nonApparel);
        tiers.kids = findTier(td.kidsData);
        return tiers;
      }, [data.storeTieringData, data.simStore]);

      const handleExport = () => {
        const exportData = depthRows.rows.map(row => ({
          Division: row.isDivision ? row.label : '',
          Category: row.isDivision ? '' : row.label,
          'Target SKUs': depthTargets[row.key] || '',
          'Plan SKU Count': row.skus,
          '% TTL SKU': row.pctSku,
          Units: row.units,
          Notes: depthNotes[row.key] || '',
        }));
        exportData.push({
          Division: 'TOTAL', Category: '', 'Target SKUs': '',
          'Plan SKU Count': depthRows.totalSkus,
          '% TTL SKU': '100%',
          Units: depthRows.totalUnits,
          Notes: '',
        });
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Depth Review');
        XLSX.writeFile(wb, 'depth-review.xlsx');
      };

      return (
        <div className="space-y-6">
          <div className="flex items-center justify-between">
            <h2 className="text-2xl font-bold text-gray-800">Step 5: Depth Review</h2>
            <button onClick={handleExport} className="px-4 py-2 bg-green-600 text-white rounded-md text-sm font-semibold hover:bg-green-700">Export to Excel</button>
          </div>

          {/* Store Info Header */}
          <div className="bg-white rounded-lg shadow-md p-4">
            <div className="grid grid-cols-2 gap-8">
              <div>
                <h3 className="text-sm font-bold text-blue-700 mb-2">{simStoreName} (Sim Store)</h3>
                <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-xs">
                  <span className="text-gray-500">Sqft:</span><span className="font-semibold">{fmtNum(data.proFormaData?.compStoreGrossSqft) || '—'}</span>
                  <span className="text-gray-500">Selling Sqft:</span><span className="font-semibold">{fmtNum(data.proFormaData?.compStoreSellingSquareFeet) || '—'}</span>
                  <span className="text-gray-500">Mens Tier:</span><span className="font-semibold">{simStoreTiers.mens}</span>
                  <span className="text-gray-500">Womens Tier:</span><span className="font-semibold">{simStoreTiers.womens}</span>
                </div>
              </div>
              <div>
                <h3 className="text-sm font-bold text-green-700 mb-2">{newStoreName} (New Store)</h3>
                <div className="grid grid-cols-2 gap-x-4 gap-y-1 text-xs">
                  <span className="text-gray-500">Sqft:</span><span className="font-semibold">{fmtNum(data.proFormaData?.newStoreGrossSqft) || '—'}</span>
                  <span className="text-gray-500">Selling Sqft:</span><span className="font-semibold">{fmtNum(data.proFormaData?.newStoreSellingSquareFeet) || '—'}</span>
                  <span className="text-gray-500">Mens Tier:</span><span className="font-semibold">{(data.assignedTiers || {}).mens || '—'}</span>
                  <span className="text-gray-500">Womens Tier:</span><span className="font-semibold">{(data.assignedTiers || {}).womens || '—'}</span>
                  <span className="text-gray-500">Non Apparel Tier:</span><span className="font-semibold">{(data.assignedTiers || {}).nonApparel || '—'}</span>
                  <span className="text-gray-500">Kids Tier:</span><span className="font-semibold">{(data.assignedTiers || {}).kids || '—'}</span>
                  <span className="text-gray-500">Net Sales:</span><span className="font-semibold">{fmtNum(data.proFormaData?.newStoreNetSales) || '—'}</span>
                </div>
              </div>
            </div>
          </div>

          {/* Reserved Units Upload */}
          <div className={`rounded-lg shadow-md p-4 ${reservedLoaded ? 'bg-green-50 border border-green-200' : 'bg-white'}`}>
            <div className="flex items-center justify-between">
              <div>
                <h3 className="text-sm font-bold text-gray-800">Reserved Units</h3>
                <p className="text-xs text-gray-500 mt-1">
                  {reservedLoaded
                    ? 'Loaded — ' + Object.keys(reservedUnits).length + ' SKUs with reserved units'
                    : 'Upload the Reserved Units file to populate units and avg depth'}
                </p>
              </div>
              <button
                onClick={() => reservedFileRef.current?.click()}
                className={`px-4 py-2 rounded text-xs font-semibold ${reservedLoaded ? 'bg-green-600 text-white hover:bg-green-700' : 'bg-blue-600 text-white hover:bg-blue-700'}`}
              >
                {reservedLoaded ? 'Reload File' : 'Upload Reserved Units (.xlsx)'}
              </button>
              <input ref={reservedFileRef} type="file" accept=".xlsx,.xls" onChange={handleReservedUpload} className="hidden" />
            </div>
          </div>

          {/* Main Depth Review Table */}
          <div className="bg-white rounded-lg shadow-md overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-xs border-collapse">
                <thead>
                  <tr className="bg-gray-700 text-white">
                    <th className="px-2 py-2 text-left font-bold" style={{minWidth:'140px'}}>DIVISION</th>
                    <th className="px-2 py-2 text-center font-bold bg-yellow-600" colSpan={2}>TARGET</th>
                    <th className="px-2 py-2 text-center font-bold bg-blue-800" colSpan={2}>TTL PLAN</th>
                    <th className="px-2 py-2 text-center font-bold bg-blue-600" colSpan={5}>TOTAL BEFORE OPENING</th>
                    <th className="px-2 py-2 text-center font-bold bg-gray-600">NOTES</th>
                  </tr>
                  <tr className="bg-gray-200 text-gray-700 border-b-2 border-gray-400">
                    <th className="px-2 py-1.5 text-left"></th>
                    <th className="px-2 py-1.5 text-center bg-yellow-50">SKU Count</th>
                    <th className="px-2 py-1.5 text-center bg-yellow-50">Units</th>
                    <th className="px-2 py-1.5 text-center">SKU Count</th>
                    <th className="px-2 py-1.5 text-center">%TTL SKU</th>
                    <th className="px-2 py-1.5 text-center">SKU Count</th>
                    <th className="px-2 py-1.5 text-center">Units</th>
                    <th className="px-2 py-1.5 text-center">%TTL SKU</th>
                    <th className="px-2 py-1.5 text-center">%TTL Units</th>
                    <th className="px-2 py-1.5 text-center">Avg Depth</th>
                    <th className="px-2 py-1.5 text-center"></th>
                  </tr>
                </thead>
                <tbody>
                  {depthRows.rows.map((row, idx) => {
                    const targetSku = parseInt(depthTargets[row.key]) || 0;
                    const variance = targetSku ? row.skus - targetSku : null;
                    const avgDepth = reservedLoaded && row.skus > 0 ? (row.units / row.skus).toFixed(0) : '—';
                    const pctUnits = reservedLoaded && depthRows.totalUnits > 0 ? ((row.units / depthRows.totalUnits) * 100).toFixed(0) + '%' : '—';
                    const displayUnits = reservedLoaded ? row.units : '—';

                    return (
                      <tr key={row.key} className={`border-b border-gray-200 ${row.isDivision ? 'bg-blue-50 font-bold' : 'hover:bg-gray-50'}`}>
                        <td className={`px-2 py-1.5 ${row.isDivision ? 'font-bold text-gray-900' : 'pl-6 text-gray-700'}`}>
                          {row.label}
                        </td>
                        <td className="px-1 py-1 text-center bg-yellow-50">
                          {row.isDivision && (
                            <input type="number" value={depthTargets[row.key] || ''} onChange={(e) => setDepthTargets(t => ({...t, [row.key]: e.target.value}))} className="w-14 px-1 py-0.5 border border-gray-300 rounded text-xs text-center" placeholder="—" />
                          )}
                        </td>
                        <td className="px-1 py-1 text-center bg-yellow-50"></td>
                        <td className={`px-2 py-1.5 text-center ${row.isDivision ? 'font-bold' : ''}`}>{row.skus}</td>
                        <td className="px-2 py-1.5 text-center">{row.pctSku}</td>
                        <td className={`px-2 py-1.5 text-center ${row.isDivision ? 'font-bold' : ''}`}>{row.skus}</td>
                        <td className={`px-2 py-1.5 text-center ${row.isDivision ? 'font-bold' : ''}`}>{displayUnits}</td>
                        <td className="px-2 py-1.5 text-center">{row.pctSku}</td>
                        <td className="px-2 py-1.5 text-center">{pctUnits}</td>
                        <td className="px-2 py-1.5 text-center">{avgDepth}</td>
                        <td className="px-1 py-1 text-center">
                          <input type="text" value={depthNotes[row.key] || ''} onChange={(e) => setDepthNotes(n => ({...n, [row.key]: e.target.value}))} className="w-full px-1 py-0.5 border border-gray-200 rounded text-xs" placeholder="" />
                        </td>
                      </tr>
                    );
                  })}
                  {/* TOTAL row */}
                  <tr className="bg-gray-800 text-white font-bold border-t-2 border-gray-600">
                    <td className="px-2 py-2">TOTAL</td>
                    <td className="px-2 py-2 text-center">{depthRows.rows.filter(r => r.isDivision).reduce((s, r) => s + (parseInt(depthTargets[r.key]) || 0), 0) || '—'}</td>
                    <td className="px-2 py-2 text-center"></td>
                    <td className="px-2 py-2 text-center">{depthRows.totalSkus}</td>
                    <td className="px-2 py-2 text-center">100%</td>
                    <td className="px-2 py-2 text-center">{depthRows.totalSkus}</td>
                    <td className="px-2 py-2 text-center">{reservedLoaded ? depthRows.totalUnits : '—'}</td>
                    <td className="px-2 py-2 text-center">100%</td>
                    <td className="px-2 py-2 text-center">{reservedLoaded ? '100%' : '—'}</td>
                    <td className="px-2 py-2 text-center">{reservedLoaded && depthRows.totalSkus > 0 ? (depthRows.totalUnits / depthRows.totalSkus).toFixed(0) : '—'}</td>
                    <td className="px-2 py-2 text-center"></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div className="flex justify-between pt-6 border-t border-gray-200">
            <button
              onClick={() => onPrev(4)}
              className="px-6 py-2 bg-gray-400 text-white rounded-md font-semibold hover:bg-gray-500"
            >
              Previous
            </button>
            <button
              onClick={() => onNext(6)}
              className="px-6 py-2 bg-blue-600 text-white rounded-md font-semibold hover:bg-blue-700"
            >
              Next: The Checklist
            </button>
          </div>
        </div>
      );
    };

    // ============================================
    // SHARED: CHECKLIST DATE COMPUTATION
    // ============================================

    const computeChecklistRows = (proFormaData) => {
      const parseDate = (str) => {
        if (!str) return null;
        const s = String(str).trim();
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s + 'T12:00:00');
        const parts = s.split('/');
        if (parts.length === 3) { let [m,d,y] = parts.map(Number); if (y<100) y+=y<50?2000:1900; return new Date(y,m-1,d); }
        return null;
      };
      const addDays = (date, days) => { if (!date) return null; const d = new Date(date); d.setDate(d.getDate() + days); return d; };
      const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const fmtDate = (date) => { if (!date) return '—'; return dayNames[date.getDay()] + ' ' + (date.getMonth()+1) + '/' + date.getDate() + '/' + date.getFullYear(); };
      const getFiscalQtr = (date) => { if (!date) return '—'; const m=date.getMonth(),y=date.getFullYear(); if(m>=1&&m<=3) return 'Q1 FY'+y; if(m>=4&&m<=6) return 'Q2 FY'+y; if(m>=7&&m<=9) return 'Q3 FY'+y; return m===0?'Q4 FY'+y:'Q4 FY'+(y+1); };
      const getWeekNum = (date) => { if (!date) return '—'; const oneJan=new Date(date.getFullYear(),0,1); const days=Math.floor((date-oneJan)/86400000); return 'W'+Math.ceil((days+oneJan.getDay()+1)/7); };
      const getAsstSeason = (date) => { if (!date) return '—'; const m=date.getMonth(); if(m>=1&&m<=3) return 'Spring'; if(m>=4&&m<=6) return 'Summer'; if(m>=7&&m<=9) return 'Fall'; return 'Holiday'; };

      const openDate = parseDate(proFormaData.newStoreOpenDate || '');
      const merchOverride = (proFormaData.dateOverrides || {}).merchDelivery || proFormaData.merchDeliveryDateOverride || '';
      const merchDefault = addDays(openDate, -4);
      const merchDate = merchOverride ? (parseDate(merchOverride) || merchDefault) : merchDefault;
      const allocDrop = addDays(merchDate, -18);
      const linesheetFinal = addDays(merchDate, -10);
      const depthReview = addDays(allocDrop, -7);
      const allocReserve = addDays(depthReview, -7);
      const merchFinalReview = addDays(allocReserve, -7);
      const merchPassOff = addDays(merchFinalReview, -7);
      const skuCountAlignment = addDays(merchPassOff, -14);
      const linesheetCreation = allocReserve;
      const dateOverrides = proFormaData.dateOverrides || {};

      const baseRows = [
        { id: 'skuCountAlignment', label: 'SKU Count Alignment', calcDate: skuCountAlignment, hint: 'Merch Pass Off - 14 days' },
        { id: 'merchPassOff', label: 'Merch Pass Off', calcDate: merchPassOff, hint: 'Final Review - 7 days' },
        { id: 'merchFinalReview', label: 'Merch Final Review', calcDate: merchFinalReview, hint: 'Alloc Reserve - 7 days' },
        { id: 'linesheetCreation', label: 'Linesheet Creation', calcDate: linesheetCreation, hint: 'Same as Alloc Reserve' },
        { id: 'allocReserve', label: 'Allocation Reserve', calcDate: allocReserve, hint: 'Depth Review - 7 days' },
        { id: 'depthReview', label: 'Depth Review', calcDate: depthReview, hint: 'Alloc Drop - 7 days' },
        { id: 'allocDrop', label: 'Allocation Drop Date', calcDate: allocDrop, hint: 'Merch Delivery - 18 days' },
        { id: 'linesheetFinal', label: 'Linesheet Creation - FINAL', calcDate: linesheetFinal, hint: 'Merch Delivery - 10 days' },
        { id: 'merchDelivery', label: 'Merch Delivery Date', calcDate: merchDefault, hint: 'Opening - 4 days', highlight: true },
        { id: 'openingDate', label: 'Opening Date', calcDate: openDate, hint: '', highlight: true },
        { id: 'openingWeek', label: 'Opening Week', textValue: getWeekNum(openDate), hint: '', readonly: true },
        { id: 'openingQtr', label: 'Opening Quarter', textValue: getFiscalQtr(openDate), hint: '', readonly: true },
        { id: 'openingAsstQtr', label: 'Opening Asst Qtr', textValue: getAsstSeason(openDate), hint: '', readonly: true },
      ];

      // Merge custom rows
      const customRows = proFormaData.customDateRows || [];
      const rows = [...baseRows];
      customRows.forEach((cr, ci) => {
        const afterIdx = rows.findIndex(r => r.label === cr.afterLabel);
        rows.splice(afterIdx >= 0 ? afterIdx + 1 : rows.length, 0, { id: 'custom_'+ci, label: cr.label, calcDate: parseDate(cr.date), hint: 'Custom', isCustom: true, customIdx: ci });
      });

      // Resolve display dates
      rows.forEach(row => {
        if (row.textValue) { row.displayDate = row.textValue; row.dateObj = null; return; }
        const override = dateOverrides[row.id];
        if (override) { const p = parseDate(override); row.displayDate = p ? fmtDate(p) : override; row.dateObj = p; row.hasOverride = true; return; }
        if (row.isCustom) { const cr = customRows[row.customIdx]; if (cr?.date) { const p = parseDate(cr.date); row.displayDate = p ? fmtDate(p) : cr.date; row.dateObj = p; } else { row.displayDate = '—'; row.dateObj = null; } return; }
        row.displayDate = row.calcDate ? fmtDate(row.calcDate) : '—';
        row.dateObj = row.calcDate;
      });

      return { rows, baseRows, customRows, parseDate, fmtDate, dateOverrides };
    };

    // ============================================
    // STEP 6: THE CHECKLIST
    // ============================================

    const Step6 = ({ onPrev, onDataChange, data }) => {
      const { rows, baseRows, customRows, parseDate, fmtDate, dateOverrides } = computeChecklistRows(data.proFormaData || {});
      const checklistComplete = data.proFormaData.checklistComplete || {};
      const checklistNotes = data.proFormaData.checklistNotes || {};
      const today = new Date(); today.setHours(0,0,0,0);

      const handleDateEdit = (row, value) => {
        if (row.isCustom) {
          const updated = [...(data.proFormaData.customDateRows || [])];
          updated[row.customIdx] = { ...updated[row.customIdx], date: value };
          onDataChange({ ...data, proFormaData: { ...data.proFormaData, customDateRows: updated } });
        } else if (row.id === 'openingDate') {
          const parsed = parseDate(value);
          const iso = parsed ? (parsed.getFullYear()+'-'+String(parsed.getMonth()+1).padStart(2,'0')+'-'+String(parsed.getDate()).padStart(2,'0')) : value;
          onDataChange({ ...data, proFormaData: { ...data.proFormaData, newStoreOpenDate: iso } });
        } else {
          onDataChange({ ...data, proFormaData: { ...data.proFormaData, dateOverrides: { ...(data.proFormaData.dateOverrides||{}), [row.id]: value } } });
        }
      };

      const toggleComplete = (id) => {
        const updated = { ...checklistComplete, [id]: !checklistComplete[id] };
        onDataChange({ ...data, proFormaData: { ...data.proFormaData, checklistComplete: updated } });
      };

      const updateNote = (id, value) => {
        const updated = { ...checklistNotes, [id]: value };
        onDataChange({ ...data, proFormaData: { ...data.proFormaData, checklistNotes: updated } });
      };

      const getEditValue = (row) => {
        if (row.isCustom) return (data.proFormaData.customDateRows || [])[row.customIdx]?.date || '';
        return dateOverrides[row.id] || (row.calcDate ? fmtDate(row.calcDate) : '');
      };

      const completedCount = rows.filter(r => checklistComplete[r.id]).length;

      const handleExportChecklist = () => {
        const exportData = rows.map(row => ({
          'Status': checklistComplete[row.id] ? 'Complete' : (row.dateObj && row.dateObj < today && !row.readonly ? 'Overdue' : 'Pending'),
          'Milestone': row.label,
          'Date': row.displayDate || '—',
          'Calculation': row.hint || '',
          'Notes': checklistNotes[row.id] || '',
        }));
        const ws = XLSX.utils.json_to_sheet(exportData);
        ws['!cols'] = [{ wch: 10 }, { wch: 28 }, { wch: 22 }, { wch: 24 }, { wch: 30 }];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Checklist');
        const storeName = (data.proFormaData?.newStoreName || 'NSO').replace(/[^a-zA-Z0-9]/g, '_');
        XLSX.writeFile(wb, storeName + '_Checklist.xlsx');
      };

      return (
        <div className="space-y-6">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-2xl font-bold text-gray-800">The Checklist</h2>
              <p className="text-sm text-gray-500 mt-1">{completedCount} of {rows.length} milestones complete</p>
            </div>
            <div className="flex items-center gap-4">
              <button onClick={handleExportChecklist} className="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-semibold hover:bg-green-700">Export Excel</button>
              <div className="w-48 bg-gray-200 rounded-full h-3">
                <div className="bg-green-500 h-3 rounded-full transition-all" style={{width: (rows.length > 0 ? (completedCount/rows.length)*100 : 0) + '%'}}></div>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-lg shadow-md overflow-hidden">
            <table className="w-full text-sm border-collapse">
              <thead>
                <tr className="bg-gray-100 border-b-2 border-gray-300">
                  <th className="px-3 py-2 text-center text-xs font-bold text-gray-600" style={{width:'40px'}}>Done</th>
                  <th className="px-3 py-2 text-left text-xs font-bold text-gray-700" style={{width:'200px'}}>Milestone</th>
                  <th className="px-3 py-2 text-left text-xs font-bold text-gray-700" style={{width:'180px'}}>Date</th>
                  <th className="px-3 py-2 text-left text-xs font-bold text-gray-400" style={{width:'160px'}}>Calc</th>
                  <th className="px-3 py-2 text-left text-xs font-bold text-gray-700">Notes</th>
                  <th className="px-3 py-2 text-center text-xs font-bold text-gray-400" style={{width:'50px'}}></th>
                </tr>
              </thead>
              <tbody>
                {rows.map((row) => {
                  const isDone = !!checklistComplete[row.id];
                  const isOverdue = !isDone && row.dateObj && row.dateObj < today && !row.readonly;
                  const isEditing = (data.proFormaData._editingDateRow || '') === row.id;
                  return (
                    <tr key={row.id} className={`border-b border-gray-200 ${isDone ? 'bg-green-50 opacity-70' : isOverdue ? 'bg-red-50' : row.highlight ? 'bg-blue-50' : row.isCustom ? 'bg-yellow-50' : 'hover:bg-gray-50'}`}>
                      <td className="px-3 py-2 text-center">
                        {!row.readonly && (
                          <input type="checkbox" checked={isDone} onChange={() => toggleComplete(row.id)} className="w-4 h-4 rounded cursor-pointer" />
                        )}
                      </td>
                      <td className={`px-3 py-2 text-xs font-semibold ${isDone ? 'line-through text-gray-400' : isOverdue ? 'text-red-700' : 'text-gray-800'}`}>
                        {row.isCustom && <span className="text-yellow-500 mr-1">●</span>}
                        {isOverdue && <span className="text-red-500 mr-1">!</span>}
                        {row.label}
                      </td>
                      <td className="px-3 py-2">
                        {isEditing ? (
                          <input type="text" value={getEditValue(row)} onChange={(e) => handleDateEdit(row, e.target.value)} onBlur={() => onDataChange({ ...data, proFormaData: { ...data.proFormaData, _editingDateRow: '' } })} onKeyDown={(e) => { if (e.key === 'Enter') onDataChange({ ...data, proFormaData: { ...data.proFormaData, _editingDateRow: '' } }); }} className="w-full px-2 py-1 border border-blue-400 rounded text-xs bg-white font-semibold" autoFocus />
                        ) : (
                          <span className={`text-xs ${isOverdue ? 'font-bold text-red-700' : isDone ? 'text-gray-400' : 'text-gray-700'}`}>{row.displayDate}</span>
                        )}
                      </td>
                      <td className="px-3 py-2 text-xs text-gray-400 italic">{row.hint}</td>
                      <td className="px-3 py-2">
                        <input type="text" value={checklistNotes[row.id] || ''} onChange={(e) => updateNote(row.id, e.target.value)} className="w-full px-2 py-1 border border-gray-200 rounded text-xs" placeholder="Notes..." />
                      </td>
                      <td className="px-3 py-2 text-center flex items-center justify-center gap-1">
                        {!row.readonly && !isEditing && <button onClick={() => onDataChange({ ...data, proFormaData: { ...data.proFormaData, _editingDateRow: row.id } })} className="text-gray-400 hover:text-blue-600 text-xs px-1" title="Edit">&#9998;</button>}
                        {row.isCustom && !isEditing && <button onClick={() => { const updated = (data.proFormaData.customDateRows||[]).filter((_,i) => i !== row.customIdx); onDataChange({ ...data, proFormaData: { ...data.proFormaData, customDateRows: updated } }); }} className="text-red-400 hover:text-red-600 text-xs px-1">✕</button>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Add Custom Milestone */}
          <div className="bg-white rounded-lg shadow-md p-4">
            <h4 className="text-sm font-bold text-gray-700 mb-3">Add Custom Milestone</h4>
            <div className="flex items-end gap-3">
              <div className="flex-1">
                <label className="block text-xs text-gray-500 mb-1">Name</label>
                <input type="text" id="checklistCustomName" className="w-full px-2 py-1.5 border border-gray-300 rounded text-xs" placeholder="e.g. Fixture Install" />
              </div>
              <div style={{width:'160px'}}>
                <label className="block text-xs text-gray-500 mb-1">Date</label>
                <input type="text" id="checklistCustomDate" className="w-full px-2 py-1.5 border border-gray-300 rounded text-xs" placeholder="MM/DD/YYYY" />
              </div>
              <div style={{width:'180px'}}>
                <label className="block text-xs text-gray-500 mb-1">Insert after</label>
                <select id="checklistCustomAfter" className="w-full px-2 py-1.5 border border-gray-300 rounded text-xs">
                  {baseRows.map(r => <option key={r.id} value={r.label}>{r.label}</option>)}
                </select>
              </div>
              <button onClick={() => { const n=document.getElementById('checklistCustomName')?.value?.trim(); if(!n)return; const d=document.getElementById('checklistCustomDate')?.value?.trim()||''; const a=document.getElementById('checklistCustomAfter')?.value||''; const updated=[...(data.proFormaData.customDateRows||[]),{label:n,date:d,afterLabel:a}]; onDataChange({...data,proFormaData:{...data.proFormaData,customDateRows:updated}}); document.getElementById('checklistCustomName').value=''; document.getElementById('checklistCustomDate').value=''; }} className="px-4 py-1.5 bg-blue-600 text-white rounded text-xs font-semibold hover:bg-blue-700 whitespace-nowrap">+ Add</button>
            </div>
          </div>

          <div className="flex justify-between pt-6 border-t border-gray-200">
            <button onClick={() => onPrev(5)} className="px-6 py-2 bg-gray-400 text-white rounded-md font-semibold hover:bg-gray-500">Previous</button>
            <div className="text-green-600 font-bold text-lg">{completedCount === rows.length && rows.length > 0 ? 'All Milestones Complete!' : ''}</div>
          </div>
        </div>
      );
    };

    // ============================================
    // STORAGE HELPERS (localStorage for standalone HTML)
    // ============================================

    const STORAGE_KEY = 'faherty_nso_projects';

    const loadAllProjects = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    };

    const saveAllProjects = (projects) => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
      } catch (e) {
        console.error('Storage save failed:', e);
      }
    };

    const saveProject = (projectId, appData) => {
      const projects = loadAllProjects();
      const storeName = appData.proFormaData?.newStoreName || 'Unnamed Store';
      const now = new Date().toISOString();
      const idx = projects.findIndex(p => p.id === projectId);

      // Build a saveable copy (strip very large data to manage storage limits)
      // PST data can be huge (1800+ rows) — we save it but warn if storage is tight
      const saveData = {
        id: projectId,
        storeName: storeName,
        status: getProjectStatus(appData),
        createdAt: idx >= 0 ? projects[idx].createdAt : now,
        updatedAt: now,
        appData: appData,
      };

      if (idx >= 0) {
        projects[idx] = saveData;
      } else {
        projects.push(saveData);
      }
      saveAllProjects(projects);
      return saveData;
    };

    const deleteProject = (projectId) => {
      const projects = loadAllProjects().filter(p => p.id !== projectId);
      saveAllProjects(projects);
    };

    const getProjectStatus = (appData) => {
      if (!appData) return 'Not Started';
      const s1 = appData.step1Complete;
      const s2 = appData.step2Complete;
      const s3 = appData.step3Complete;
      const hasSKUs = (appData.pstData || []).length > 0;
      const hasSignoffs = appData.divisionSignoffs && Object.keys(appData.divisionSignoffs).length > 0;
      if (hasSignoffs) return 'Review Complete';
      if (hasSKUs && s3) return 'Assortment Ready';
      if (s2) return 'Tiering Done';
      if (s1) return 'Store Setup Done';
      return 'In Progress';
    };

    const generateId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

    const makeBlankAppData = () => ({
      proFormaData: {
        newStoreName: '', newStoreOpenDate: '', newStoreRegion: '', newStoreArea: '',
        newStoreVibe: '', newStoreGrossSqft: '', newStoreSellingSquareFeet: '', newStoreRent: '',
        newStoreNetSales: '', newStoreGM: '', newStoreEBITDA: '', newStoreTraffic: '',
        newStoreCVR: '', newStoreAOV: '', newStoreSalesPerSqft: '', newStorePayback: '',
        compStoreName: '', compStoreOpenDate: '', compStoreRegion: '', compStoreArea: '',
        compStoreGrossSqft: '', compStoreSellingSquareFeet: '', compStoreRent: '',
        compStoreNetSales: '', compStoreGM: '', compStoreEBITDA: '', compStoreTraffic: '',
        compStoreCVR: '', compStoreAOV: '', compStoreSalesPerSqft: '', compStorePayback: '',
        compStoreAnalysis: [],
        divMix: {},
      },
      storeTieringData: {
        allStores: [], mensData: [], womensData: [], nonApparel: [],
        kidsData: [], storeGroups: [], storeMatrix: {}, totalRollup: [],
      },
      pstData: [], selectedDeliveries: [], selectedGroups: [],
      skuActions: {}, assignedTiers: {}, simStore: '', skuTargets: {},
      step1Complete: false, step2Complete: false, step3Complete: false,
    });

    // ============================================
    // DASHBOARD COMPONENT
    // ============================================

    const Dashboard = ({ onOpenProject, onNewProject }) => {
      const [projects, setProjects] = useState(loadAllProjects());
      const [search, setSearch] = useState('');
      const [confirmDelete, setConfirmDelete] = useState(null);

      const filtered = projects.filter(p =>
        !search || p.storeName.toLowerCase().includes(search.toLowerCase())
      ).sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

      // Split into active vs archived (opening date has passed = archived)
      const today = new Date(); today.setHours(0,0,0,0);
      const parseOpenDate = (p) => {
        const s = p.appData?.proFormaData?.newStoreOpenDate || '';
        if (!s) return null;
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return new Date(s + 'T12:00:00');
        const parts = String(s).split('/');
        if (parts.length === 3) { let [m,d,y] = parts.map(Number); if(y<100)y+=y<50?2000:1900; return new Date(y,m-1,d); }
        return null;
      };
      const activeProjects = filtered.filter(p => { const d = parseOpenDate(p); return !d || d >= today; });
      const archivedProjects = filtered.filter(p => { const d = parseOpenDate(p); return d && d < today; });
      const [showArchived, setShowArchived] = useState(false);

      const handleDelete = (id) => {
        deleteProject(id);
        setProjects(loadAllProjects());
        setConfirmDelete(null);
      };

      const handleDuplicate = (project) => {
        const newId = generateId();
        const dupData = JSON.parse(JSON.stringify(project.appData));
        dupData.proFormaData.newStoreName = project.storeName + ' (Copy)';
        dupData.divisionSignoffs = {};
        saveProject(newId, dupData);
        setProjects(loadAllProjects());
      };

      const statusColor = (status) => {
        switch(status) {
          case 'Review Complete': return 'bg-green-100 text-green-800 border-green-200';
          case 'Assortment Ready': return 'bg-blue-100 text-blue-800 border-blue-200';
          case 'Tiering Done': return 'bg-purple-100 text-purple-800 border-purple-200';
          case 'Store Setup Done': return 'bg-yellow-100 text-yellow-800 border-yellow-200';
          default: return 'bg-gray-100 text-gray-600 border-gray-200';
        }
      };

      const formatDate = (iso) => {
        if (!iso) return '—';
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' ' +
               d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      };

      return (
        <div className="min-h-screen bg-gray-100">
          {/* Header */}
          <div className="bg-gray-900 text-white">
            <div className="max-w-6xl mx-auto px-8 py-6">
              <div className="flex items-center justify-between">
                <div>
                  <h1 className="text-2xl font-bold tracking-tight">Faherty NSO Assortment Tool</h1>
                  <p className="text-gray-400 text-sm mt-1">New Store Opening — Assortment Planning</p>
                </div>
                <button
                  onClick={onNewProject}
                  className="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition flex items-center gap-2"
                >
                  <span className="text-lg leading-none">+</span> New Store Project
                </button>
              </div>
            </div>
          </div>

          {/* Content */}
          <div className="max-w-6xl mx-auto px-8 py-8">
            {/* Search & Stats */}
            <div className="flex items-center justify-between mb-6">
              <div className="flex items-center gap-4">
                <input
                  type="text"
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="Search stores..."
                  className="px-4 py-2 border border-gray-300 rounded-lg text-sm w-64 focus:outline-none focus:border-blue-400"
                />
                <span className="text-sm text-gray-500">{activeProjects.length} active{archivedProjects.length > 0 ? (' · ' + archivedProjects.length + ' archived') : ''}</span>
              </div>
            </div>

            {filtered.length === 0 ? (
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-16 text-center">
                <div className="text-5xl mb-4">🏪</div>
                <h2 className="text-xl font-bold text-gray-800 mb-2">
                  {projects.length === 0 ? 'No Store Projects Yet' : 'No Matches'}
                </h2>
                <p className="text-gray-500 mb-6">
                  {projects.length === 0
                    ? 'Create your first NSO project to get started.'
                    : 'No projects match your search.'}
                </p>
                {projects.length === 0 && (
                  <button onClick={onNewProject} className="px-5 py-2.5 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700">
                    + Create First Project
                  </button>
                )}
              </div>
            ) : (
              <Fragment>
              {/* Active Projects */}
              {activeProjects.length > 0 && (
                <div className="space-y-2">
                  {activeProjects.map(project => (
                    <div key={project.id} className="bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-gray-300 transition cursor-pointer">
                    <div className="flex items-center px-6 py-4">
                      {/* Store Name & Status */}
                      <div className="flex-1 min-w-0" onClick={() => onOpenProject(project.id)}>
                        <div className="flex items-center gap-3 mb-1">
                          <h3 className="text-lg font-bold text-gray-900 truncate">{project.storeName || 'Unnamed Store'}</h3>
                          <span className={`px-2.5 py-0.5 rounded-full text-xs font-semibold border ${statusColor(project.status)}`}>
                            {project.status}
                          </span>
                        </div>
                        <div className="flex items-center gap-4 text-xs text-gray-500">
                          <span>Created: {formatDate(project.createdAt)}</span>
                          <span>·</span>
                          <span>Last saved: {formatDate(project.updatedAt)}</span>
                          {project.appData?.pstData?.length > 0 && (
                            <Fragment>
                              <span>·</span>
                              <span className="font-semibold text-gray-700">{project.appData.pstData.length} PST SKUs</span>
                            </Fragment>
                          )}
                        </div>
                      </div>

                      {/* Actions */}
                      <div className="flex items-center gap-2 ml-4">
                        <button
                          onClick={(e) => { e.stopPropagation(); onOpenProject(project.id); }}
                          className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700"
                        >
                          Open
                        </button>
                        <button
                          onClick={(e) => { e.stopPropagation(); handleDuplicate(project); }}
                          className="px-3 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm font-semibold hover:bg-gray-200"
                          title="Duplicate"
                        >
                          ⧉
                        </button>
                        {confirmDelete === project.id ? (
                          <div className="flex items-center gap-1">
                            <button
                              onClick={(e) => { e.stopPropagation(); handleDelete(project.id); }}
                              className="px-3 py-2 bg-red-600 text-white rounded-lg text-xs font-bold hover:bg-red-700"
                            >
                              Confirm
                            </button>
                            <button
                              onClick={(e) => { e.stopPropagation(); setConfirmDelete(null); }}
                              className="px-3 py-2 bg-gray-200 text-gray-700 rounded-lg text-xs font-bold hover:bg-gray-300"
                            >
                              Cancel
                            </button>
                          </div>
                        ) : (
                          <button
                            onClick={(e) => { e.stopPropagation(); setConfirmDelete(project.id); }}
                            className="px-3 py-2 bg-gray-100 text-red-500 rounded-lg text-sm font-semibold hover:bg-red-50"
                            title="Delete"
                          >
                            ✕
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              )}

              {/* Archived Projects (opened stores) */}
              {archivedProjects.length > 0 && (
                <div className="mt-6">
                  <button onClick={() => setShowArchived(!showArchived)} className="flex items-center gap-2 text-sm font-semibold text-gray-500 hover:text-gray-700 mb-2">
                    <span className="text-xs">{showArchived ? '▼' : '▶'}</span>
                    Archived — {archivedProjects.length} opened store{archivedProjects.length !== 1 ? 's' : ''}
                  </button>
                  {showArchived && (
                    <div className="space-y-2 opacity-75">
                      {archivedProjects.map(project => (
                        <div key={project.id} className="bg-gray-50 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition cursor-pointer">
                          <div className="flex items-center px-6 py-3">
                            <div className="flex-1 min-w-0" onClick={() => onOpenProject(project.id)}>
                              <div className="flex items-center gap-3 mb-1">
                                <h3 className="text-base font-bold text-gray-600 truncate">{project.storeName || 'Unnamed Store'}</h3>
                                <span className="px-2 py-0.5 rounded-full text-xs font-semibold bg-gray-200 text-gray-600 border border-gray-300">Opened</span>
                              </div>
                              <div className="text-xs text-gray-400">Last saved: {formatDate(project.updatedAt)}</div>
                            </div>
                            <button onClick={(e) => { e.stopPropagation(); onOpenProject(project.id); }} className="px-3 py-1.5 bg-gray-200 text-gray-600 rounded-lg text-xs font-semibold hover:bg-gray-300">Open</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
              </Fragment>
            )}

            {/* Aggregated Checklist — Gantt-style view (active projects only) */}
            {activeProjects.length > 0 && (
              <div className="mt-10">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-bold text-gray-800">Checklist Overview</h3>
                  <button onClick={() => {
                    const mIds = ['skuCountAlignment','merchPassOff','merchFinalReview','linesheetCreation','allocReserve','depthReview','allocDrop','linesheetFinal','merchDelivery','openingDate'];
                    const mLabels = { skuCountAlignment:'SKU Count Alignment', merchPassOff:'Merch Pass Off', merchFinalReview:'Merch Final Review', linesheetCreation:'Linesheet Creation', allocReserve:'Allocation Reserve', depthReview:'Depth Review', allocDrop:'Allocation Drop Date', linesheetFinal:'Linesheet Creation - FINAL', merchDelivery:'Merch Delivery Date', openingDate:'Opening Date' };
                    const td = new Date(); td.setHours(0,0,0,0);
                    const exportRows = [];
                    mIds.forEach(id => {
                      const row = { Milestone: mLabels[id] };
                      activeProjects.forEach(project => {
                        const pf = project.appData?.proFormaData || {};
                        const { rows } = computeChecklistRows(pf);
                        const cc = pf.checklistComplete || {};
                        const r = rows.find(x => x.id === id);
                        const done = !!cc[id];
                        const overdue = !done && r?.dateObj && r.dateObj < td;
                        const dateStr = r?.dateObj ? ((r.dateObj.getMonth()+1)+'/'+r.dateObj.getDate()+'/'+r.dateObj.getFullYear()) : '—';
                        const name = project.storeName || 'Unnamed';
                        row[name] = (done ? '✓ ' : overdue ? '! ' : '') + dateStr;
                      });
                      exportRows.push(row);
                    });
                    const ws = XLSX.utils.json_to_sheet(exportRows);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, 'All Checklists');
                    XLSX.writeFile(wb, 'NSO_Checklist_Overview.xlsx');
                  }} className="px-4 py-1.5 bg-green-600 text-white rounded-lg text-xs font-semibold hover:bg-green-700">Export Excel</button>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                  {(() => {
                    const mIds = ['skuCountAlignment','merchPassOff','merchFinalReview','linesheetCreation','allocReserve','depthReview','allocDrop','linesheetFinal','merchDelivery','openingDate'];
                    const mLabels = { skuCountAlignment:'SKU Count Alignment', merchPassOff:'Merch Pass Off', merchFinalReview:'Merch Final Review', linesheetCreation:'Linesheet Creation', allocReserve:'Allocation Reserve', depthReview:'Depth Review', allocDrop:'Allocation Drop Date', linesheetFinal:'Linesheet Creation - FINAL', merchDelivery:'Merch Delivery Date', openingDate:'Opening Date' };
                    const td = new Date(); td.setHours(0,0,0,0);

                    const handleAggToggle = (projectId, milestoneId) => {
                      const all = loadAllProjects();
                      const p = all.find(x => x.id === projectId);
                      if (!p?.appData?.proFormaData) return;
                      const cc = p.appData.proFormaData.checklistComplete || {};
                      cc[milestoneId] = !cc[milestoneId];
                      p.appData.proFormaData.checklistComplete = cc;
                      saveAllProjects(all);
                      setProjects(loadAllProjects());
                    };

                    return (
                      <table className="text-xs border-collapse">
                        <thead>
                          <tr className="bg-gray-100 border-b-2 border-gray-300">
                            <th className="px-2 py-1.5 text-left font-bold text-gray-700 sticky left-0 bg-gray-100 z-10" style={{width:'200px',minWidth:'200px'}}>Milestone</th>
                            {activeProjects.map(project => (
                              <th key={project.id} className="px-2 py-1.5 text-center font-bold text-gray-700 cursor-pointer hover:text-blue-600 whitespace-nowrap" onClick={() => onOpenProject(project.id)}>
                                <div className="text-xs">{project.storeName || 'New'}</div>
                              </th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {mIds.map(id => {
                            return (
                              <tr key={id} className="border-b border-gray-200 hover:bg-gray-50">
                                <td className="px-2 py-1.5 font-semibold text-gray-800 sticky left-0 bg-white z-10 text-xs whitespace-nowrap">{mLabels[id]}</td>
                                {activeProjects.map(project => {
                                  const pf = project.appData?.proFormaData || {};
                                  const { rows } = computeChecklistRows(pf);
                                  const cc = pf.checklistComplete || {};
                                  const row = rows.find(r => r.id === id);
                                  const done = !!cc[id];
                                  const overdue = !done && row?.dateObj && row.dateObj < td;
                                  const short = row?.dateObj ? ((row.dateObj.getMonth()+1)+'/'+row.dateObj.getDate()) : '—';
                                  return (
                                    <td key={project.id} className={`px-1 py-1 text-center ${done ? 'bg-green-50' : overdue ? 'bg-red-50' : ''}`}>
                                      <div className="flex flex-col items-center">
                                        <input type="checkbox" checked={done} onChange={() => handleAggToggle(project.id, id)} className="w-3 h-3 cursor-pointer" />
                                        <span className={`text-xs leading-tight ${done ? 'text-green-600 line-through' : overdue ? 'text-red-600 font-bold' : 'text-gray-500'}`}>{short}</span>
                                      </div>
                                    </td>
                                  );
                                })}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    );
                  })()}
                </div>
                <p className="text-xs text-gray-400 mt-2">Red = overdue · Green = complete · Click store name to open project checklist</p>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ============================================
    // MAIN APP COMPONENT (with Dashboard + Save)
    // ============================================

    const App = () => {
      const [view, setView] = useState('dashboard'); // 'dashboard' or 'project'
      const [activeProjectId, setActiveProjectId] = useState(null);
      const [currentStep, setCurrentStep] = useState(1);
      const [saveStatus, setSaveStatus] = useState(''); // '', 'saving', 'saved'
      const [appData, setAppData] = useState(makeBlankAppData());

      const handleOpenProject = (projectId) => {
        const projects = loadAllProjects();
        const project = projects.find(p => p.id === projectId);
        if (project && project.appData) {
          setAppData(project.appData);
          setActiveProjectId(projectId);
          setCurrentStep(1);
          setView('project');
        }
      };

      const handleNewProject = () => {
        const newId = generateId();
        const blank = makeBlankAppData();
        setAppData(blank);
        setActiveProjectId(newId);
        setCurrentStep(1);
        setView('project');
      };

      const handleBackToDashboard = () => {
        // Auto-save before going back
        if (activeProjectId) {
          doSave();
        }
        setView('dashboard');
        setActiveProjectId(null);
      };

      const doSave = useCallback(() => {
        if (!activeProjectId) return;
        setSaveStatus('saving');
        try {
          saveProject(activeProjectId, appData);
          setSaveStatus('saved');
          setTimeout(() => setSaveStatus(''), 2500);
        } catch(e) {
          setSaveStatus('error');
          console.error('Save failed:', e);
          setTimeout(() => setSaveStatus(''), 3000);
        }
      }, [activeProjectId, appData]);

      const handleNext = (step) => {
        setCurrentStep(step);
        window.scrollTo(0, 0);
      };

      const handlePrev = (step) => {
        setCurrentStep(step);
        window.scrollTo(0, 0);
      };

      const handleDataChange = (newData) => {
        setAppData(newData);
      };

      // Auto-save when moving between steps
      const handleNextWithSave = (step) => {
        handleNext(step);
        if (activeProjectId) {
          setTimeout(() => doSave(), 100);
        }
      };

      const getStepStatus = (step) => {
        if (step === 1) return appData.step1Complete;
        if (step === 2) return appData.step2Complete;
        if (step === 3) return appData.step3Complete;
        return false;
      };

      // Dashboard view
      if (view === 'dashboard') {
        return <Dashboard onOpenProject={handleOpenProject} onNewProject={handleNewProject} />;
      }

      // Project view
      const storeName = appData.proFormaData?.newStoreName || 'New Store';

      return (
        <div className="flex min-h-screen bg-gray-100">
          {/* Sidebar */}
          <div className="w-64 bg-gray-900 text-white p-6 fixed h-full overflow-y-auto flex flex-col">
            <h1 className="text-lg font-bold mb-2">Faherty NSO Tool</h1>

            {/* Back to Dashboard */}
            <button
              onClick={handleBackToDashboard}
              className="w-full text-left px-3 py-2 rounded-lg text-xs text-gray-400 hover:text-white hover:bg-gray-800 transition mb-2 flex items-center gap-2"
            >
              ← All Projects
            </button>

            {/* Active Store Name */}
            <div className="px-3 py-2 mb-4 bg-gray-800 rounded-lg border border-gray-700">
              <div className="text-xs text-gray-500 uppercase tracking-wide mb-0.5">Active Store</div>
              <div className="text-sm font-semibold truncate" title={storeName}>{storeName}</div>
            </div>

            <nav className="space-y-2 flex-1">
              {[
                { num: 1, label: 'Store Setup' },
                { num: 2, label: 'Tiering & Groups' },
                { num: 3, label: 'Deliveries' },
                { num: 4, label: 'Assortment Review' },
                { num: 5, label: 'Depth Review' },
                { num: 6, label: 'The Checklist' },
              ].map(({ num, label }) => (
                <button
                  key={num}
                  onClick={() => handleNext(num)}
                  className={`w-full text-left px-4 py-3 rounded-lg transition ${
                    currentStep === num
                      ? 'bg-blue-600 text-white font-bold'
                      : 'bg-gray-800 text-gray-300 hover:bg-gray-700'
                  }`}
                >
                  <div className="flex items-center justify-between">
                    <span className="text-sm">{num}. {label}</span>
                    {getStepStatus(num) && <span className="text-green-400">✓</span>}
                  </div>
                </button>
              ))}
            </nav>

            {/* Save Button at Bottom */}
            <div className="mt-4 pt-4 border-t border-gray-700 space-y-2">
              <button
                onClick={doSave}
                className={`w-full px-4 py-3 rounded-lg font-bold text-sm transition ${
                  saveStatus === 'saved'
                    ? 'bg-green-600 text-white'
                    : saveStatus === 'saving'
                    ? 'bg-yellow-600 text-white'
                    : saveStatus === 'error'
                    ? 'bg-red-600 text-white'
                    : 'bg-blue-600 text-white hover:bg-blue-700'
                }`}
              >
                {saveStatus === 'saved' ? '✓ Saved!' :
                 saveStatus === 'saving' ? 'Saving...' :
                 saveStatus === 'error' ? '✕ Save Failed' :
                 '💾 Save Store'}
              </button>
              <div className="text-xs text-gray-500 text-center">
                {(() => {
                  const projects = loadAllProjects();
                  const p = projects.find(p => p.id === activeProjectId);
                  if (p?.updatedAt) {
                    const d = new Date(p.updatedAt);
                    return 'Last saved: ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                  }
                  return 'Not saved yet';
                })()}
              </div>
            </div>
          </div>

          {/* Main Content */}
          <div className="ml-64 flex-1 p-8">
            <div className="max-w-6xl mx-auto">
              {currentStep === 1 && <Step1 onNext={handleNextWithSave} onDataChange={handleDataChange} data={appData} />}
              {currentStep === 2 && <Step2 onNext={handleNextWithSave} onPrev={handlePrev} onDataChange={handleDataChange} data={appData} />}
              {currentStep === 3 && <Step3 onNext={handleNextWithSave} onPrev={handlePrev} onDataChange={handleDataChange} data={appData} />}
              {currentStep === 4 && <Step4 onNext={handleNextWithSave} onPrev={handlePrev} onDataChange={handleDataChange} data={appData} />}
              {currentStep === 5 && <Step5 onNext={handleNextWithSave} onPrev={handlePrev} data={appData} />}
              {currentStep === 6 && <Step6 onPrev={handlePrev} onDataChange={handleDataChange} data={appData} />}
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
